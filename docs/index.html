<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnam Summer Itinerary 2026</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <!-- Tailwind CSS CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Alpine.js CDN -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        #map {
            height: 100%;
            width: 100%;
            z-index: 10;
        }

        /* Custom Leaflet Marker Pulse */
        .pulse-marker {
            background: rgba(37, 99, 235, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(37, 99, 235, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased" x-data="travelApp()" x-cloak>

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="compass" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">Travel <span class="text-blue-600">Planner</span></h1>
            </div>
            
            <!-- Plan Selector Dropdown -->
            <div class="relative" x-data="{ open: false }" @click.away="open = false">
                <button 
                    @click="open = !open"
                    class="flex items-center gap-3 bg-slate-100 px-4 py-2 rounded-xl border border-slate-200 hover:bg-slate-200 transition-all min-w-[200px] justify-between"
                >
                    <div class="flex items-center gap-2">
                        <i data-lucide="layers" class="w-4 h-4 text-blue-600"></i>
                        <span class="text-sm font-bold text-slate-700 uppercase tracking-wider" x-text="currentPlan.title"></span>
                    </div>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform" :class="open ? 'rotate-180' : ''"></i>
                </button>

                <div 
                    x-show="open"
                    x-transition:enter="transition ease-out duration-100"
                    x-transition:enter-start="transform opacity-0 scale-95"
                    x-transition:enter-end="transform opacity-100 scale-100"
                    class="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-xl border border-slate-200 py-2 z-[1001]"
                >
                    <div class="px-4 py-2 border-b border-slate-100 mb-1">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Chọn hành trình</p>
                    </div>
                    <template x-for="(plan, id) in plans" :key="id">
                        <button 
                            @click="switchPlan(id); open = false"
                            class="w-full flex flex-col items-start px-4 py-3 hover:bg-slate-50 transition-colors text-left border-l-4"
                            :class="currentPlanId === id ? 'border-blue-600 bg-blue-50/30' : 'border-transparent'"
                        >
                            <div class="flex justify-between w-full items-center">
                                <span class="text-sm font-bold text-slate-900" x-text="plan.title"></span>
                                <span class="text-[10px] font-bold text-blue-600" x-text="plan.totalCost"></span>
                            </div>
                            <span class="text-[10px] text-slate-500" x-text="plan.dateRange"></span>
                        </button>
                    </template>
                </div>
            </div>

            <div class="hidden lg:flex items-center gap-6 text-sm font-medium text-slate-500">
                <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-4 h-4"></i> <span x-text="currentPlan.dateRange"></span></span>
                <span class="flex items-center gap-1"><i data-lucide="wallet" class="w-4 h-4"></i> <span x-text="currentPlan.totalCost"></span></span>
                <span class="flex items-center gap-1"><i data-lucide="users" class="w-4 h-4"></i> <span x-text="currentPlan.locations.length"></span> Địa điểm</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Cột trái: Bản đồ & Lộ trình -->
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 overflow-hidden">
                    <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                        <i data-lucide="map" class="w-5 h-5 text-blue-600"></i>
                        Bản đồ lộ trình thực tế
                    </h2>
                    
                    <!-- Leaflet Map Container -->
                    <div class="relative aspect-[3/4] bg-slate-50 rounded-xl border border-slate-100 overflow-hidden">
                        <div id="map"></div>
                        
                        <!-- Legend -->
                        <div class="absolute bottom-4 left-4 text-[10px] text-slate-400 space-y-1 bg-white/90 p-2 rounded-lg backdrop-blur-sm border border-slate-100 z-[1000]">
                            <p class="flex items-center gap-1"><span class="w-2 h-2 bg-blue-600 rounded-full"></span> Điểm đang chọn</p>
                            <p class="flex items-center gap-1"><span class="w-2 h-2 bg-slate-400 rounded-full"></span> Điểm đến</p>
                            <p class="flex items-center gap-1">
                                <span class="w-3 h-0.5 bg-blue-500 inline-block"></span>
                                Lộ trình di chuyển
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Tabs di động -->
                <div class="flex overflow-x-auto gap-2 pb-2 no-scrollbar">
                    <template x-for="loc in currentPlan.locations" :key="loc.id">
                        <button 
                            @click="activeId = loc.id"
                            class="flex-none px-4 py-2 rounded-full text-sm font-medium transition-all whitespace-nowrap"
                            :class="activeId === loc.id ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:border-blue-300'"
                            x-text="loc.name"
                        ></button>
                    </template>
                </div>
            </div>

            <!-- Cột phải: Chi tiết địa điểm -->
            <div class="lg:col-span-7 space-y-6">
                <template x-if="activeLocation">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-500">
                        <!-- Hero Image / Header -->
                        <div class="relative h-48 sm:h-64 overflow-hidden">
                            <img :src="activeLocation.image" class="w-full h-full object-cover" :alt="activeLocation.name">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                            <div class="absolute bottom-6 left-6 text-white">
                                <p class="text-blue-300 text-xs font-bold uppercase tracking-widest mb-1" x-text="activeLocation.dateRange"></p>
                                <h2 class="text-3xl font-bold" x-text="activeLocation.name"></h2>
                            </div>
                        </div>

                        <!-- Content -->
                        <div class="p-6 sm:p-8 space-y-8">
                            <!-- Overview -->
                            <div class="grid grid-cols-2 sm:grid-cols-5 gap-4">
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Thời gian</p>
                                    <p class="text-sm font-semibold text-slate-700" x-text="activeLocation.duration"></p>
                                </div>
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Lưu trú</p>
                                    <p class="text-sm font-semibold text-slate-700" x-text="activeLocation.stay"></p>
                                </div>
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Di chuyển</p>
                                    <p class="text-sm font-semibold text-slate-700" x-text="activeLocation.transport"></p>
                                </div>
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Chi phí</p>
                                    <p class="text-sm font-semibold text-blue-600" x-text="activeLocation.cost"></p>
                                </div>
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Đặc điểm</p>
                                    <p class="text-sm font-semibold text-slate-700" x-text="activeLocation.highlight"></p>
                                </div>
                            </div>

                            <!-- Activities & Food -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <i data-lucide="camera" class="w-4 h-4 text-blue-600"></i>
                                        Hoạt động nổi bật
                                    </h3>
                                    <ul class="space-y-3">
                                        <template x-for="act in activeLocation.activities" :key="act">
                                            <li class="flex items-start gap-3 text-slate-600 text-sm">
                                                <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500 mt-0.5 flex-none"></i>
                                                <span x-text="act"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                                <div>
                                    <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <i data-lucide="utensils" class="w-4 h-4 text-orange-500"></i>
                                        Ẩm thực nên thử
                                    </h3>
                                    <div class="flex flex-wrap gap-2">
                                        <template x-for="food in activeLocation.foods" :key="food">
                                            <span class="px-3 py-1 bg-orange-50 text-orange-700 text-xs font-medium rounded-full border border-orange-100" x-text="food"></span>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <!-- Transport Note -->
                            <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 flex gap-4">
                                <div class="bg-blue-600 p-2 rounded-lg h-fit">
                                    <i data-lucide="bus" class="text-white w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 class="text-sm font-bold text-blue-900 mb-1">Thông tin di chuyển</h4>
                                    <p class="text-sm text-blue-700 leading-relaxed" x-text="activeLocation.transportNote"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-12 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-400 text-sm">© 2025-2026 Vietnam Travel Planner. Tối ưu cho trải nghiệm nghỉ dưỡng và khám phá.</p>
        </div>
    </footer>

                                cost: '2.500.000đ',
                                image: 'https://picsum.photos/seed/hcmcreturn/800/600',
                                activities: ['Bay từ Nội Bài về Tân Sơn Nhất', 'Kết thúc hành trình'],
                                foods: ['Cơm nhà'],
                                transportNote: 'Gửi xe ô tô về bằng tàu hỏa/xe tải và bay về lại TP.HCM.'
                            }
                        ]
                    }
                },
                get currentPlan() {
                    return this.plans[this.currentPlanId];
                },
                get activeLocation() {
                    return this.currentPlan.locations.find(l => l.id === this.activeId);
                },
                init() {
                    // Load plan from URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const planParam = urlParams.get('plan');
                    if (planParam && this.plans[planParam]) {
                        this.currentPlanId = planParam;
                    }
                    
                    this.activeId = this.currentPlan.locations[0].id;

                    this.$nextTick(() => {
                        lucide.createIcons();
                        this.initMap();
                    });
                    
                    this.$watch('activeId', (id) => {
                        this.$nextTick(() => {
                            lucide.createIcons();
                            this.updateMapSelection(id);
                        });
                    });
                },
                switchPlan(id) {
                    this.currentPlanId = id;
                    this.activeId = this.currentPlan.locations[0].id;
                    
                    // Update URL
                    const url = new URL(window.location);
                    url.searchParams.set('plan', id);
                    window.history.pushState({}, '', url);
                    
                    this.refreshMap();
                    this.$nextTick(() => lucide.createIcons());
                },
                async initMap() {
                    if (this.map) return;
                    
                    this.map = L.map('map', {
                        center: [16.0, 106.5],
                        zoom: 6,
                        zoomControl: false
                    });

                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(this.map);

                    L.control.zoom({ position: 'topright' }).addTo(this.map);
                    
                    this.drawPlanOnMap();
                },
                refreshMap() {
                    // Clear existing markers
                    Object.values(this.markers).forEach(m => this.map.removeLayer(m));
                    this.markers = {};
                    
                    if (this.polyline) {
                        this.map.removeLayer(this.polyline);
                        this.polyline = null;
                    }
                    
                    this.drawPlanOnMap();
                },
                async drawPlanOnMap() {
                    const locations = this.currentPlan.locations;
                    
                    // Add markers
                    locations.forEach(loc => {
                        const marker = L.circleMarker([loc.lat, loc.lng], {
                            radius: 8,
                            fillColor: loc.id === this.activeId ? "#2563eb" : "#94a3b8",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1
                        }).addTo(this.map);
                        
                        marker.on('click', () => {
                            this.activeId = loc.id;
                        });

                        this.markers[loc.id] = marker;
                    });

                    // Draw route
                    try {
                        const coordsString = locations.map(p => `${p.lng},${p.lat}`).join(';');
                        const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsString}?overview=full&geometries=geojson`);
                        const data = await response.json();

                        if (data.routes && data.routes.length > 0) {
                            const routeGeoJSON = data.routes[0].geometry;
                            this.polyline = L.geoJSON(routeGeoJSON, {
                                style: {
                                    color: '#2563eb',
                                    weight: 4,
                                    opacity: 0.7,
                                    dashArray: '1, 10',
                                    lineCap: 'round'
                                }
                            }).addTo(this.map);

                            this.map.fitBounds(this.polyline.getBounds(), {
                                padding: [50, 50]
                            });
                        }
                    } catch (error) {
                        console.error("Error fetching road route:", error);
                        const fallbackCoords = locations.map(p => [p.lat, p.lng]);
                        this.polyline = L.polyline(fallbackCoords, {
                            color: '#2563eb',
                            weight: 3,
                            opacity: 0.6,
                            dashArray: '10, 10'
                        }).addTo(this.map);

                        this.map.fitBounds(this.polyline.getBounds(), {
                            padding: [50, 50]
                        });
                    }
                },
                updateMapSelection(id) {
                    if (!this.map) return;

                    Object.keys(this.markers).forEach(markerId => {
                        this.markers[markerId].setStyle({
                            fillColor: parseInt(markerId) === id ? "#2563eb" : "#94a3b8",
                            radius: parseInt(markerId) === id ? 10 : 8
                        });
                    });

                    const activeLoc = this.activeLocation;
                    if (activeLoc) {
                        this.map.flyTo([activeLoc.lat, activeLoc.lng], 9, {
                            duration: 1.5
                        });
                    }
                }
            }
        }
    </script>
</body>
</html>
