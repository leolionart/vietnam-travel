services:
  app:
    image: ghcr.io/leolionart/vietnam-travel:latest
    # build: .   # uncomment to build locally instead of pulling from GHCR
    ports:
      - "7321:7321"
    environment:
      - JWT_SECRET=${JWT_SECRET?JWT_SECRET is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD?ADMIN_PASSWORD is required}
      - DB_PATH=/data/travel.db
      - PORT=7321
      - NODE_ENV=production
      - VEXERE_USERNAME=${VEXERE_USERNAME:-}
      - VEXERE_PASSWORD=${VEXERE_PASSWORD:-}
      - VEXERE_USE_UAT=${VEXERE_USE_UAT:-false}
      - FORCE_MIGRATE=${FORCE_MIGRATE:-false}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7321/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes: {}
