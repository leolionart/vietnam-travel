<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VietTravel - Hành trình của bạn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .font-display { font-family: var(--font-display); }
        .font-serif { font-family: var(--font-serif); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .leaflet-container {
            background: #0f172a !important;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: 15px;
            top: 32px;
            bottom: -16px;
            width: 1px;
            background: rgba(255,255,255,0.1);
        }
        .timeline-item:last-child::after { display: none; }

        [x-cloak] { display: none !important; }

        /* Animations */
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            #map { height: 250px; position: sticky; top: 0; z-index: 10; }
            .fixed:not(header) { position: relative !important; top: auto !important; left: auto !important; right: auto !important; bottom: auto !important; width: 100% !important; }
            header.fixed { position: sticky !important; top: 0; z-index: 60; background: #0f172a; padding: 0.75rem !important; }
            .timeline-rail { display: none !important; }
            .mobile-timeline { 
                display: flex !important; 
                position: sticky; 
                top: 250px; 
                z-index: 20; 
                background: #0f172a; 
                padding: 0.75rem; 
                border-bottom: 1px solid rgba(255,255,255,0.1);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            }
            .detail-panel { margin-top: 0 !important; padding: 0 !important; }
            .detail-panel > div { border-radius: 0 !important; height: auto !important; min-height: 50vh; }
            .status-bar { position: sticky !important; bottom: 0; margin: 0 !important; width: 100% !important; z-index: 50; }
            .status-bar > div { border-radius: 0 !important; border-left: none; border-right: none; border-bottom: none; }
            main { padding-bottom: 0; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="travelApp()" x-cloak>

    <!-- Background Map -->
    <div id="map"></div>

    <!-- Top Navigation -->
    <header class="fixed top-0 left-0 w-full z-50 p-4 lg:p-6 flex flex-col lg:flex-row justify-between items-center gap-4 pointer-events-none">
        <div class="flex items-center gap-4 pointer-events-auto w-full lg:w-auto">
            <div class="w-10 h-10 lg:w-12 lg:h-12 bg-white rounded-2xl flex items-center justify-center text-slate-900 shadow-2xl">
                <i data-lucide="compass" class="w-5 h-5 lg:w-6 lg:h-6"></i>
            </div>
            <div class="glass px-4 py-2 rounded-2xl flex-1 lg:flex-none">
                <h1 class="text-base lg:text-lg font-bold font-display tracking-tight">VietTravel</h1>
                <p class="text-[8px] lg:text-[10px] font-bold text-blue-400 uppercase tracking-widest">Premium Planner</p>
            </div>
        </div>

        <div class="flex items-center gap-3 pointer-events-auto w-full lg:w-auto overflow-x-auto pb-2 lg:pb-0 no-scrollbar">
            <div class="glass p-1 rounded-2xl flex gap-1 whitespace-nowrap">
                <template x-for="(plan, id) in plans" :key="id">
                    <button @click="changePlan(id)" 
                            class="px-3 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all"
                            :class="currentPlanId === id ? 'bg-white text-slate-900' : 'text-slate-400 hover:text-white'">
                        <span x-text="plan.name"></span>
                    </button>
                </template>
            </div>
        </div>
    </header>

    <!-- Left Timeline Rail (Desktop) -->
    <aside class="fixed left-6 top-28 bottom-28 w-64 z-40 flex flex-col gap-4 pointer-events-none timeline-rail lg:flex hidden">
        <div class="glass rounded-3xl p-6 flex-1 overflow-y-auto pointer-events-auto shadow-2xl">
            <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-6">Lộ trình chi tiết</h2>
            <div class="space-y-8">
                <template x-for="(loc, index) in currentPlan.locations" :key="loc.id">
                    <div class="relative timeline-item group cursor-pointer" @click="setActive(loc.id)">
                        <div class="flex items-start gap-4">
                            <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center flex-none transition-all duration-300"
                                 :class="activeId === loc.id ? 'bg-white border-white text-slate-900 scale-110' : 'bg-slate-900 border-slate-700 text-slate-500 group-hover:border-slate-500'">
                                <span class="text-[10px] font-bold" x-text="index + 1"></span>
                            </div>
                            <div class="pt-1">
                                <h3 class="text-sm font-bold transition-colors" :class="activeId === loc.id ? 'text-white' : 'text-slate-400 group-hover:text-slate-200'" x-text="loc.name"></h3>
                                <p class="text-[10px] font-medium text-slate-500 mt-0.5" x-text="loc.highlight"></p>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </aside>

    <!-- Mobile Timeline (Horizontal) -->
    <div class="lg:hidden mobile-timeline hidden overflow-x-auto gap-3 no-scrollbar">
        <template x-for="(loc, index) in currentPlan.locations" :key="loc.id">
            <button @click="setActive(loc.id)" 
                    class="glass px-4 py-2 rounded-xl flex items-center gap-2 whitespace-nowrap transition-all flex-none"
                    :class="activeId === loc.id ? 'bg-white text-slate-900' : 'text-slate-400 border-white/5'">
                <span class="text-[10px] font-bold" x-text="index + 1"></span>
                <span class="text-[10px] font-bold" x-text="loc.name"></span>
            </button>
        </template>
    </div>

    <!-- Right Detail Panel -->
    <main class="fixed right-6 top-28 bottom-28 w-[450px] z-40 pointer-events-none detail-panel" :class="activeId ? 'block' : 'hidden'">
        <div class="glass rounded-[2rem] lg:rounded-[2.5rem] h-full flex flex-col overflow-hidden pointer-events-auto shadow-2xl border-white/5 slide-up relative">
            
            <!-- Close Button (Mobile Only) -->
            <button @click="activeId = null" class="lg:hidden absolute top-4 right-4 z-50 w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            
            <!-- Hero Image -->
            <div class="h-48 lg:h-56 relative flex-none overflow-hidden">
                <img :src="`https://loremflickr.com/800/600/${activeLocation.name.replace(/\s+/g, ',')},vietnam,travel`" 
                     class="w-full h-full object-cover transition-transform duration-1000 hover:scale-110" 
                     referrerPolicy="no-referrer"
                     :alt="activeLocation.name">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-transparent to-transparent"></div>
                <div class="absolute bottom-4 lg:bottom-6 left-6 lg:left-8">
                    <span class="text-[8px] lg:text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1 block" x-text="activeLocation.transport"></span>
                    <h2 class="text-2xl lg:text-3xl font-serif italic text-white" x-text="activeLocation.name"></h2>
                </div>
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-6 lg:p-8 space-y-6 lg:space-y-8">
                
                <!-- Description -->
                <div>
                    <p class="text-xs lg:text-sm text-slate-400 leading-relaxed" x-text="activeLocation.description"></p>
                </div>

                <!-- Bento Grid Info -->
                <div class="grid grid-cols-2 gap-3 lg:gap-4">
                    <div class="bg-white/5 rounded-2xl p-3 lg:p-4 border border-white/5">
                        <p class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1 lg:mb-2">Thời gian</p>
                        <p class="text-xs lg:text-sm font-bold text-white" x-text="activeLocation.duration + ' Ngày'"></p>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-3 lg:p-4 border border-white/5">
                        <p class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1 lg:mb-2">Di chuyển</p>
                        <p class="text-xs lg:text-sm font-bold text-white" x-text="activeLocation.transport"></p>
                    </div>
                </div>

                <!-- Cost Calculator -->
                <div class="bg-blue-600/10 rounded-2xl lg:rounded-3xl p-5 lg:p-6 border border-blue-500/20">
                    <div class="flex items-center justify-between mb-4 lg:mb-6">
                        <h4 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Dự toán chi phí</h4>
                        <i data-lucide="calculator" class="w-4 h-4 text-blue-400"></i>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Người lớn</p>
                                <p class="text-[10px] font-medium text-slate-300" x-text="formatCurrency(activeLocation.adultPrice)"></p>
                            </div>
                            <div class="flex items-center gap-2 lg:gap-3 bg-white/5 rounded-xl p-1">
                                <button @click="activeLocation.adults = Math.max(1, activeLocation.adults - 1)" class="w-6 h-6 lg:w-7 lg:h-7 flex items-center justify-center hover:bg-white/10 rounded-lg transition-all">-</button>
                                <span class="w-4 text-center text-[10px] lg:text-xs font-bold" x-text="activeLocation.adults"></span>
                                <button @click="activeLocation.adults++" class="w-6 h-6 lg:w-7 lg:h-7 flex items-center justify-center hover:bg-white/10 rounded-lg transition-all">+</button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Trẻ em</p>
                                <p class="text-[10px] font-medium text-slate-300" x-text="formatCurrency(activeLocation.childPrice)"></p>
                            </div>
                            <div class="flex items-center gap-2 lg:gap-3 bg-white/5 rounded-xl p-1">
                                <button @click="activeLocation.children = Math.max(0, activeLocation.children - 1)" class="w-6 h-6 lg:w-7 lg:h-7 flex items-center justify-center hover:bg-white/10 rounded-lg transition-all">-</button>
                                <span class="w-4 text-center text-[10px] lg:text-xs font-bold" x-text="activeLocation.children"></span>
                                <button @click="activeLocation.children++" class="w-6 h-6 lg:w-7 lg:h-7 flex items-center justify-center hover:bg-white/10 rounded-lg transition-all">+</button>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 lg:mt-6 pt-4 lg:pt-6 border-t border-white/10 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-slate-400">Tổng cộng</span>
                        <span class="text-lg lg:text-xl font-bold text-white font-display" x-text="formatCurrency(calculateLocationCost(activeLocation))"></span>
                    </div>
                </div>

                <!-- Activities -->
                <div>
                    <h4 class="text-[9px] lg:text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 lg:mb-4">Hoạt động nổi bật</h4>
                    <div class="space-y-2 lg:space-y-3">
                        <template x-for="act in activeLocation.activities" :key="act">
                            <div class="flex items-center gap-3 text-xs lg:text-sm text-slate-300">
                                <div class="w-1.5 h-1.5 rounded-full bg-blue-500 flex-none"></div>
                                <span x-text="act"></span>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Food -->
                <div>
                    <h4 class="text-[9px] lg:text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 lg:mb-4">Ẩm thực nên thử</h4>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="food in activeLocation.food" :key="food">
                            <span class="px-3 py-1.5 bg-white/5 rounded-full text-[9px] lg:text-[10px] font-bold text-slate-300 border border-white/5" x-text="food"></span>
                        </template>
                    </div>
                </div>

            </div>

            <!-- Footer Action -->
            <div class="p-6 lg:p-8 bg-white/5 border-t border-white/5">
                <button @click="addToCalendar()" class="w-full bg-white text-slate-900 py-3 lg:py-4 rounded-2xl font-bold text-xs lg:text-sm hover:bg-slate-100 transition-all shadow-xl flex items-center justify-center gap-2">
                    <i data-lucide="calendar-plus" class="w-4 h-4"></i>
                    Thêm vào lịch
                </button>
            </div>
        </div>
    </main>

    <!-- Bottom Status Bar -->
    <footer class="fixed bottom-4 lg:bottom-6 left-4 lg:left-6 right-4 lg:right-6 z-40 pointer-events-none status-bar">
        <div class="glass rounded-2xl lg:rounded-3xl p-3 lg:p-4 flex justify-between items-center pointer-events-auto shadow-2xl border-white/5">
            <div class="flex items-center gap-3 lg:gap-6">
                <div class="flex flex-col">
                    <span class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider">Thời gian dự kiến</span>
                    <span class="text-xs lg:text-sm font-bold text-white" x-text="currentPlan.dateRange"></span>
                </div>
                <div class="w-px h-6 lg:h-8 bg-white/10"></div>
                <div class="flex flex-col">
                    <span class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider">Tổng ngân sách</span>
                    <span class="text-xs lg:text-sm font-bold text-blue-400" x-text="formatCurrency(calculateTotalPlanCost())"></span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button @click="printPlan()" class="w-8 h-8 lg:w-10 lg:h-10 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all">
                    <i data-lucide="printer" class="w-3 h-3 lg:w-4 lg:h-4"></i>
                </button>
                <button @click="sharePlan()" class="w-8 h-8 lg:w-10 lg:h-10 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all">
                    <i data-lucide="share-2" class="w-3 h-3 lg:w-4 lg:h-4"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        function travelApp() {
            return {
                currentPlanId: 'plan-1',
                activeId: 1,
                map: null,
                markers: {},
                polyline: null,
                plans: {},

                get currentPlan() {
                    return this.plans[this.currentPlanId] || { locations: [] };
                },

                get activeLocation() {
                    if (!this.currentPlan.locations.length) return {};
                    return this.currentPlan.locations.find(l => l.id === this.activeId) || this.currentPlan.locations[0];
                },

                async init() {
                    lucide.createIcons();
                    
                    try {
                        const response = await fetch('./plans.json');
                        this.plans = await response.json();
                        
                        this.$nextTick(() => {
                            this.initMap();
                        });
                    } catch (e) {
                        console.error("Lỗi khi tải dữ liệu kế hoạch:", e);
                    }

                    this.$watch('activeId', () => {
                        this.$nextTick(() => lucide.createIcons());
                        this.updateMap();
                    });
                    this.$watch('currentPlanId', () => {
                        this.$nextTick(() => lucide.createIcons());
                        this.updateMap();
                    });
                },

                initMap() {
                    this.map = L.map('map', {
                        zoomControl: false,
                        attributionControl: false
                    });
                    
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(this.map);

                    if (this.plans[this.currentPlanId]) {
                        this.changePlan(this.currentPlanId);
                    } else if (Object.keys(this.plans).length > 0) {
                        this.changePlan(Object.keys(this.plans)[0]);
                    }
                },

                async updateMap(fitBounds = false) {
                    if (!this.map) return;

                    Object.values(this.markers).forEach(m => this.map.removeLayer(m));
                    this.markers = {};
                    if (this.polyline) this.map.removeLayer(this.polyline);

                    const points = [];
                    this.currentPlan.locations.forEach((loc, index) => {
                        const isActive = loc.id === this.activeId;
                        const marker = L.marker([loc.lat, loc.lng], {
                            icon: L.divIcon({
                                className: 'custom-div-icon',
                                html: `
                                    <div class="relative group">
                                        <div class="w-8 h-8 ${isActive ? 'bg-blue-500 scale-125' : 'bg-slate-800'} rounded-full border-2 border-white shadow-xl flex items-center justify-center text-white font-bold text-xs transition-all duration-300">
                                            ${index + 1}
                                        </div>
                                        <div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-white text-slate-900 px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity shadow-lg pointer-events-none">
                                            ${loc.name}
                                        </div>
                                    </div>
                                `,
                                iconSize: [32, 32],
                                iconAnchor: [16, 16]
                            })
                        }).addTo(this.map);

                        marker.on('click', () => this.setActive(loc.id));
                        this.markers[loc.id] = marker;
                        points.push([loc.lat, loc.lng]);
                    });

                    const mapCoords = this.currentPlan.locations.map(loc => `${loc.lng},${loc.lat}`).join(';');

                    try {
                        const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${mapCoords}?overview=full&geometries=geojson`);
                        const data = await response.json();

                        if (data.routes && data.routes.length > 0) {
                            this.polyline = L.geoJSON(data.routes[0].geometry, {
                                style: {
                                    color: '#3b82f6',
                                    weight: 3,
                                    opacity: 0.6,
                                    dashArray: '10, 10',
                                    lineJoin: 'round'
                                }
                            }).addTo(this.map);
                        } else {
                            throw new Error('Không có route từ OSRM');
                        }
                    } catch (error) {
                        console.error('Lỗi khi vẽ route đường bộ, fallback về đường thẳng:', error);
                        this.polyline = L.polyline(points, {
                            color: '#3b82f6',
                            weight: 3,
                            opacity: 0.6,
                            dashArray: '10, 10',
                            lineJoin: 'round'
                        }).addTo(this.map);
                    }

                    if (fitBounds && this.polyline) {
                        this.map.fitBounds(this.polyline.getBounds(), { padding: [50, 50] });
                    } else if (this.activeId) {
                        const loc = this.activeLocation;
                        this.map.flyTo([loc.lat, loc.lng], 13, { duration: 1.5 });
                    }
                },

                setActive(id) {
                    this.activeId = id;
                    this.updateMap(false);
                },

                changePlan(planId) {
                    if (planId) this.currentPlanId = planId;
                    this.activeId = this.currentPlan.locations[0].id;
                    this.$nextTick(() => {
                        this.updateMap(true);
                    });
                },

                formatCurrency(value) {
                    return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(value);
                },

                calculateLocationCost(loc) {
                    if (!loc) return 0;
                    const days = typeof loc.duration === 'number' ? loc.duration : 1;
                    const adults = loc.adults || 0;
                    const children = loc.children || 0;
                    return ((loc.adultPrice * adults) + (loc.childPrice * children)) * days;
                },

                calculateTotalPlanCost(plan = this.currentPlan) {
                    if (!plan || !plan.locations) return 0;
                    return plan.locations.reduce((total, loc) => {
                        return total + this.calculateLocationCost(loc);
                    }, 0);
                },

                sharePlan() {
                    const shareUrl = new URL(window.location.href);
                    shareUrl.searchParams.set('plan', this.currentPlanId);
                    const text = `Lịch trình ${this.currentPlan.name}`;

                    if (navigator.share) {
                        navigator.share({
                            title: this.currentPlan.name,
                            text,
                            url: shareUrl.toString(),
                        }).catch(() => {});
                        return;
                    }

                    navigator.clipboard.writeText(shareUrl.toString())
                        .then(() => alert('Đã copy link chia sẻ vào clipboard'))
                        .catch(() => alert(shareUrl.toString()));
                },

                printPlan() {
                    const plan = this.currentPlan;
                    if (!plan || !Array.isArray(plan.locations) || plan.locations.length === 0) return;

                    const escapeHtml = (value) => String(value ?? '')
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#39;');

                    const formatMoney = (value) => new Intl.NumberFormat('vi-VN', {
                        style: 'currency',
                        currency: 'VND'
                    }).format(Number(value || 0));

                    const rowsHtml = plan.locations.map((loc, index) => {
                        const cost = this.calculateLocationCost(loc);
                        const stayDays = typeof loc.duration === 'number' ? `${loc.duration} ngày` : String(loc.duration || '');
                        return `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${escapeHtml(loc.name)}</td>
                                <td>${escapeHtml(loc.province || '')}</td>
                                <td>${escapeHtml(loc.dateRange || '')}</td>
                                <td>${escapeHtml(stayDays)}</td>
                                <td>${escapeHtml(loc.transport)}</td>
                                <td>${escapeHtml(loc.highlight)}</td>
                                <td>${escapeHtml((loc.activities || []).join(', '))}</td>

                addToCalendar() {
                    const loc = this.activeLocation;
                    if (!loc || !loc.name) return;

                    const now = new Date();
                    const start = new Date(now.getTime() + 60 * 60 * 1000);
                    const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);

                    const formatDate = (date) => {
                        const pad = (value) => String(value).padStart(2, '0');
                        return `${date.getUTCFullYear()}${pad(date.getUTCMonth() + 1)}${pad(date.getUTCDate())}T${pad(date.getUTCHours())}${pad(date.getUTCMinutes())}${pad(date.getUTCSeconds())}Z`;
                    };

                    const details = [
                        loc.description || '',
                        `Di chuyển: ${loc.transport || 'N/A'}`,
                        `Điểm nổi bật: ${loc.highlight || 'N/A'}`,
                    ].join('\n');

                    const calendarUrl = new URL('https://calendar.google.com/calendar/render');
                    calendarUrl.searchParams.set('action', 'TEMPLATE');
                    calendarUrl.searchParams.set('text', loc.name);
                    calendarUrl.searchParams.set('details', details);
                    calendarUrl.searchParams.set('location', `${loc.name}, Việt Nam`);
                    calendarUrl.searchParams.set('dates', `${formatDate(start)}/${formatDate(end)}`);

                    window.open(calendarUrl.toString(), '_blank', 'noopener,noreferrer');
                }
            }
