<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnam Summer Itinerary 2026</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Alpine.js CDN -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        #map {
            height: 100%;
            width: 100%;
            z-index: 10;
        }

        /* Custom Leaflet Marker Pulse */
        .pulse-marker {
            background: rgba(37, 99, 235, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(37, 99, 235, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased" x-data="travelApp()" x-cloak>

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="map-pin" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">Vietnam Journey <span class="text-blue-600">2026</span></h1>
            </div>
            <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-500">
                <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-4 h-4"></i> 18/06 - 15/07</span>
                <span class="flex items-center gap-1"><i data-lucide="users" class="w-4 h-4"></i> 4 Địa điểm</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Cột trái: Bản đồ & Lộ trình -->
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 overflow-hidden">
                    <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                        <i data-lucide="map" class="w-5 h-5 text-blue-600"></i>
                        Bản đồ lộ trình thực tế
                    </h2>
                    
                    <!-- Leaflet Map Container -->
                    <div class="relative aspect-[3/4] bg-slate-50 rounded-xl border border-slate-100 overflow-hidden">
                        <div id="map"></div>
                        
                        <!-- Legend -->
                        <div class="absolute bottom-4 left-4 text-[10px] text-slate-400 space-y-1 bg-white/90 p-2 rounded-lg backdrop-blur-sm border border-slate-100 z-[1000]">
                            <p class="flex items-center gap-1"><span class="w-2 h-2 bg-blue-600 rounded-full"></span> Điểm đang chọn</p>
                            <p class="flex items-center gap-1"><span class="w-2 h-2 bg-slate-400 rounded-full"></span> Điểm đến</p>
                            <p class="flex items-center gap-1">
                                <span class="w-3 h-0.5 bg-blue-500 inline-block"></span>
                                Lộ trình xe bus
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Tabs di động -->
                <div class="flex overflow-x-auto gap-2 pb-2 no-scrollbar">
                    <template x-for="loc in [locations[0], locations[2], locations[1], locations[3]]" :key="loc.id">
                        <button 
                            @click="activeId = loc.id"
                            class="flex-none px-4 py-2 rounded-full text-sm font-medium transition-all whitespace-nowrap"
                            :class="activeId === loc.id ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:border-blue-300'"
                            x-text="loc.name"
                        ></button>
                    </template>
                </div>
            </div>

            <!-- Cột phải: Chi tiết địa điểm -->
            <div class="lg:col-span-7 space-y-6">
                <template x-if="activeLocation">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-500">
                        <!-- Hero Image / Header -->
                        <div class="relative h-48 sm:h-64 overflow-hidden">
                            <img :src="activeLocation.image" class="w-full h-full object-cover" :alt="activeLocation.name">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                            <div class="absolute bottom-6 left-6 text-white">
                                <p class="text-blue-300 text-xs font-bold uppercase tracking-widest mb-1" x-text="activeLocation.dateRange"></p>
                                <h2 class="text-3xl font-bold" x-text="activeLocation.name"></h2>
                            </div>
                        </div>

                        <!-- Content -->
                        <div class="p-6 sm:p-8 space-y-8">
                            <!-- Overview -->
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Thời gian</p>
                                    <p class="text-sm font-semibold text-slate-700" x-text="activeLocation.duration"></p>
                                </div>
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Lưu trú</p>
                                    <p class="text-sm font-semibold text-slate-700" x-text="activeLocation.stay"></p>
                                </div>
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Di chuyển</p>
                                    <p class="text-sm font-semibold text-slate-700" x-text="activeLocation.transport"></p>
                                </div>
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Đặc điểm</p>
                                    <p class="text-sm font-semibold text-slate-700" x-text="activeLocation.highlight"></p>
                                </div>
                            </div>

                            <!-- Activities & Food -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <i data-lucide="camera" class="w-4 h-4 text-blue-600"></i>
                                        Hoạt động nổi bật
                                    </h3>
                                    <ul class="space-y-3">
                                        <template x-for="act in activeLocation.activities" :key="act">
                                            <li class="flex items-start gap-3 text-slate-600 text-sm">
                                                <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500 mt-0.5 flex-none"></i>
                                                <span x-text="act"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                                <div>
                                    <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <i data-lucide="utensils" class="w-4 h-4 text-orange-500"></i>
                                        Ẩm thực nên thử
                                    </h3>
                                    <div class="flex flex-wrap gap-2">
                                        <template x-for="food in activeLocation.foods" :key="food">
                                            <span class="px-3 py-1 bg-orange-50 text-orange-700 text-xs font-medium rounded-full border border-orange-100" x-text="food"></span>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <!-- Transport Note -->
                            <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 flex gap-4">
                                <div class="bg-blue-600 p-2 rounded-lg h-fit">
                                    <i data-lucide="bus" class="text-white w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 class="text-sm font-bold text-blue-900 mb-1">Lưu ý di chuyển buổi tối</h4>
                                    <p class="text-sm text-blue-700 leading-relaxed" x-text="activeLocation.transportNote"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-12 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-400 text-sm">© 2026 Vietnam Travel Planner. Tối ưu cho trải nghiệm nghỉ dưỡng và khám phá.</p>
        </div>
    </footer>

    <script>
        function travelApp() {
            return {
                activeId: 1,
                map: null,
                markers: {},
                polyline: null,
                locations: [
                    {
                        id: 1,
                        name: 'Hà Nội',
                        lat: 21.0285, lng: 105.8542,
                        dateRange: '18/06 - 20/06',
                        duration: '3 Ngày',
                        stay: 'Phố Cổ',
                        transport: 'Máy bay/Tàu',
                        highlight: 'Văn hóa',
                        image: 'https://picsum.photos/seed/hanoi/800/600',
                        activities: [
                            'Khám phá 36 phố phường cổ kính',
                            'Thưởng thức Cà phê trứng Giảng nổi tiếng',
                            'Dạo hồ Hoàn Kiếm lúc sáng sớm',
                            'Tham quan Văn Miếu Quốc Tử Giám'
                        ],
                        foods: ['Bún chả', 'Phở bò', 'Cà phê trứng', 'Chả cá Lã Vọng'],
                        transportNote: 'Điểm bắt đầu hành trình. Chuẩn bị di chuyển đến Nghệ An bằng xe giường nằm.'
                    },
                    {
                        id: 2,
                        name: 'Ninh Bình',
                        lat: 20.2506, lng: 105.9745,
                        dateRange: '08/07 - 14/07',
                        duration: '1 Tuần',
                        stay: 'Tam Cốc',
                        transport: 'Xe giường nằm',
                        highlight: 'Thiên nhiên',
                        image: 'https://picsum.photos/seed/ninhbinh/800/600',
                        activities: [
                            'Chèo thuyền Tràng An (Vé 250k/người)',
                            'Leo Hang Múa ngắm toàn cảnh Tam Cốc',
                            'Đạp xe quanh các cánh đồng lúa',
                            'Thăm Cố đô Hoa Lư'
                        ],
                        foods: ['Cơm cháy', 'Thịt dê núi', 'Ốc núi', 'Rượu Kim Sơn'],
                        transportNote: 'Di chuyển từ Nghệ An mất khoảng 3-4 tiếng. Nghỉ tại các homestay ở Tam Cốc.'
                    },
                    {
                        id: 3,
                        name: 'Nghệ An',
                        lat: 18.8214, lng: 105.7142,
                        dateRange: '21/06 - 07/07',
                        duration: '10 Ngày',
                        stay: 'Cửa Lò',
                        transport: 'Xe giường nằm',
                        highlight: 'Nghỉ dưỡng biển',
                        image: 'https://picsum.photos/seed/nghean/800/600',
                        activities: [
                            'Tắm biển Cửa Lò buổi sáng sớm',
                            'Thăm Quê Bác (Kim Liên, Nam Đàn)',
                            'Khám phá đảo Lan Châu',
                            'Thư giãn tại các resort ven biển'
                        ],
                        foods: ['Súp lươn', 'Cháo lươn', 'Mực nhảy Cửa Lò', 'Nhút Thanh Chương'],
                        transportNote: 'Chặng nghỉ dài nhất tập trung vào hồi phục sức khỏe. Tối 07/07 sẽ di chuyển đến Ninh Bình.'
                    },
                    {
                        id: 4,
                        name: 'Hạ Long',
                        lat: 20.9501, lng: 107.0733,
                        dateRange: '15/07 - 21/07',
                        duration: '1 Tuần',
                        stay: 'Bãi Cháy',
                        transport: 'Xe Cabin riêng',
                        highlight: 'Kỳ quan',
                        image: 'https://picsum.photos/seed/halong/800/600',
                        activities: [
                            'Tour tàu thăm vịnh (700k - 1.2tr/vé)',
                            'Check-in Bảo tàng Quảng Ninh',
                            'Vui chơi tại Sun World Hạ Long',
                            'Ngắm hoàng hôn trên cầu Bãi Cháy'
                        ],
                        foods: ['Chả mực', 'Sá sùng', 'Bún bề bề', 'Sam biển'],
                        transportNote: 'Sử dụng xe Cabin riêng từ Ninh Bình để đảm bảo giấc ngủ ngon.'
                    }
                ],
                get activeLocation() {
                    return this.locations.find(l => l.id === this.activeId);
                },
                init() {
                    this.$nextTick(() => {
                        lucide.createIcons();
                        this.initMap();
                    });
                    
                    this.$watch('activeId', (id) => {
                        this.$nextTick(() => {
                            lucide.createIcons();
                            this.updateMapSelection(id);
                        });
                    });
                },
                async initMap() {
                    // Initialize Leaflet map
                    this.map = L.map('map', {
                        center: [20.0, 106.5],
                        zoom: 7,
                        zoomControl: false
                    });

                    // Add OpenStreetMap layer
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(this.map);

                    L.control.zoom({ position: 'topright' }).addTo(this.map);

                    // Add markers
                    this.locations.forEach(loc => {
                        const marker = L.circleMarker([loc.lat, loc.lng], {
                            radius: 8,
                            fillColor: "#94a3b8",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1
                        }).addTo(this.map);
                        
                        marker.on('click', () => {
                            this.activeId = loc.id;
                        });

                        this.markers[loc.id] = marker;
                    });

                    // Fetch and draw actual road routes (Hanoi -> Nghe An -> Ninh Binh -> Ha Long -> Hanoi)
                    const routePoints = [
                        this.locations[0], // Hanoi
                        this.locations[2], // Nghe An
                        this.locations[1], // Ninh Binh
                        this.locations[3], // Ha Long
                        this.locations[0]  // Return to Hanoi
                    ];

                    try {
                        const coordsString = routePoints.map(p => `${p.lng},${p.lat}`).join(';');
                        const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsString}?overview=full&geometries=geojson`);
                        const data = await response.json();

                        if (data.routes && data.routes.length > 0) {
                            const routeGeoJSON = data.routes[0].geometry;
                            
                            // Draw the actual road route
                            this.polyline = L.geoJSON(routeGeoJSON, {
                                style: {
                                    color: '#2563eb',
                                    weight: 4,
                                    opacity: 0.7,
                                    dashArray: '1, 10',
                                    lineCap: 'round'
                                }
                            }).addTo(this.map);

                            // Add animation effect to the route
                            let dashOffset = 0;
                            setInterval(() => {
                                dashOffset--;
                                this.polyline.setStyle({ dashOffset: dashOffset.toString() });
                            }, 50);

                            // Fit map to show the entire route
                            this.map.fitBounds(this.polyline.getBounds(), {
                                padding: [30, 30],
                                maxZoom: 8
                            });
                        }
                    } catch (error) {
                        console.error("Error fetching road route:", error);
                        // Fallback to straight lines if API fails
                        const fallbackCoords = routePoints.map(p => [p.lat, p.lng]);
                        this.polyline = L.polyline(fallbackCoords, {
                            color: '#2563eb',
                            weight: 3,
                            opacity: 0.6,
                            dashArray: '10, 10'
                        }).addTo(this.map);

                        this.map.fitBounds(this.polyline.getBounds(), {
                            padding: [30, 30]
                        });
                    }

                    // Don't flyTo immediately on init to keep the overview
                    this.updateMapSelection(this.activeId, true);
                },
                updateMapSelection(id, isInit = false) {
                    if (!this.map) return;

                    // Reset all markers
                    Object.values(this.markers).forEach(marker => {
                        marker.setStyle({
                            fillColor: "#94a3b8",
                            radius: 8
                        });
                    });

                    // Highlight active marker
                    const activeLoc = this.locations.find(l => l.id === id);
                    if (activeLoc && this.markers[id]) {
                        this.markers[id].setStyle({
                            fillColor: "#2563eb",
                            radius: 10
                        });
                        
                        // Only flyTo if it's not the initial load
                        if (!isInit) {
                            this.map.flyTo([activeLoc.lat, activeLoc.lng], 9, {
                                duration: 1.5
                            });
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
