<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viet Roadtrips - Kế hoạch xuyên tỉnh của bạn</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .font-display { font-family: var(--font-display); }
        .font-serif { font-family: var(--font-serif); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .leaflet-container {
            background: #0f172a !important;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: 15px;
            top: 32px;
            bottom: -16px;
            width: 1px;
            background: rgba(255,255,255,0.1);
        }
        .timeline-item:last-child::after { display: none; }

        [x-cloak] { display: none !important; }

        /* Animations */
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            #map { height: 250px; position: sticky; top: 0; z-index: 10; }
            .fixed:not(header) { position: relative !important; top: auto !important; left: auto !important; right: auto !important; bottom: auto !important; width: 100% !important; }
            header.fixed { position: sticky !important; top: 0; z-index: 60; background: #0f172a; padding: 0.75rem !important; }
            .timeline-rail { display: none !important; }
            .mobile-timeline { 
                display: flex !important; 
                position: sticky; 
                top: 250px; 
                z-index: 20; 
                background: #0f172a; 
                padding: 0.75rem; 
                border-bottom: 1px solid rgba(255,255,255,0.1);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            }
            .detail-panel { margin-top: 0 !important; padding: 0 !important; }
            .detail-panel > div { border-radius: 0 !important; height: auto !important; min-height: 50vh; }
            .status-bar { position: sticky !important; bottom: 0; margin: 0 !important; width: 100% !important; z-index: 50; }
            .status-bar > div { border-radius: 0 !important; border-left: none; border-right: none; border-bottom: none; }
            main { padding-bottom: 0; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="travelApp()" x-cloak>

    <!-- Background Map -->
    <div id="map"></div>

    <!-- Top Navigation -->
    <header class="fixed top-0 left-0 w-full z-50 p-4 lg:p-6 flex flex-col lg:flex-row justify-between items-center gap-4 pointer-events-none">
        <div class="flex items-center gap-4 pointer-events-auto w-full lg:w-auto">
            <div class="w-10 h-10 lg:w-12 lg:h-12 bg-white rounded-2xl flex items-center justify-center text-slate-900 shadow-2xl">
                <i data-lucide="compass" class="w-5 h-5 lg:w-6 lg:h-6"></i>
            </div>
            <div class="glass px-4 py-2 rounded-2xl flex-1 lg:flex-none">
                <h1 class="text-base lg:text-lg font-bold font-display tracking-tight">Viet Roadtrips</h1>
                <p class="text-[8px] lg:text-[10px] font-bold text-blue-400 uppercase tracking-widest">Premium Planner</p>
            </div>
        </div>

        <div class="flex items-center gap-3 pointer-events-auto w-full lg:w-auto overflow-x-auto pb-2 lg:pb-0 no-scrollbar">
            <div class="glass p-1 rounded-2xl flex gap-1 whitespace-nowrap">
                <template x-for="(plan, id) in plans" :key="id">
                    <button @click="changePlan(id)" 
                            class="px-3 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all"
                            :class="currentPlanId === id ? 'bg-white text-slate-900' : 'text-slate-400 hover:text-white'">
                        <span x-text="plan.name"></span>
                    </button>
                </template>
            </div>
        </div>
    </header>

    <!-- Left Timeline Rail (Desktop) -->
    <aside class="fixed left-6 top-28 bottom-28 w-64 z-40 flex flex-col gap-4 pointer-events-none timeline-rail lg:flex hidden">
        <div class="glass rounded-3xl p-6 flex-1 overflow-y-auto pointer-events-auto shadow-2xl">
            <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-6">Lộ trình chi tiết</h2>
            <div class="space-y-8">
                <template x-for="(loc, index) in currentPlan.locations" :key="loc.id">
                    <div class="relative timeline-item group cursor-pointer" @click="setActive(loc.id)">
                        <div class="flex items-start gap-4">
                            <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center flex-none transition-all duration-300"
                                 :class="activeId === loc.id ? 'bg-white border-white text-slate-900 scale-110' : 'bg-slate-900 border-slate-700 text-slate-500 group-hover:border-slate-500'">
                                <span class="text-[10px] font-bold" x-text="index + 1"></span>
                            </div>
                            <div class="pt-1">
                                <h3 class="text-sm font-bold transition-colors" :class="activeId === loc.id ? 'text-white' : 'text-slate-400 group-hover:text-slate-200'" x-text="loc.name"></h3>
                                <p class="text-[10px] font-medium text-slate-500 mt-0.5" x-text="loc.highlight"></p>
                                <p class="text-[9px] font-medium text-slate-500 mt-1" x-text="formatDateRangeCompact(loc.dateRange)"></p>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </aside>

    <!-- Mobile Timeline (Horizontal) -->
    <div class="lg:hidden mobile-timeline hidden overflow-x-auto gap-3 no-scrollbar">
        <template x-for="(loc, index) in currentPlan.locations" :key="loc.id">
            <button @click="setActive(loc.id)" 
                    class="glass px-4 py-2 rounded-xl flex items-center gap-2 whitespace-nowrap transition-all flex-none"
                    :class="activeId === loc.id ? 'bg-white text-slate-900' : 'text-slate-400 border-white/5'">
                <span class="text-[10px] font-bold" x-text="index + 1"></span>
                <span class="text-[10px] font-bold" x-text="loc.name"></span>
            </button>
        </template>
    </div>

    <!-- Right Detail Panel -->
    <main class="fixed right-6 top-28 bottom-28 w-[450px] z-40 pointer-events-none detail-panel" :class="activeId ? 'block' : 'hidden'">
        <div class="glass rounded-[2rem] lg:rounded-[2.5rem] h-full flex flex-col overflow-hidden pointer-events-auto shadow-2xl border-white/5 slide-up relative">
            
            <!-- Close Button (Mobile Only) -->
            <button @click="activeId = null" class="lg:hidden absolute top-4 right-4 z-50 w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            
            <!-- Hero Image -->
            <div class="relative flex-none overflow-hidden transition-all duration-300 ease-in-out"
                 :style="detailScrolled ? 'height: 3rem' : 'height: 14rem'">
                <img :src="`https://loremflickr.com/800/600/${activeLocation.name.replace(/\s+/g, ',')},vietnam,travel`"
                     class="w-full h-full object-cover transition-transform duration-1000 hover:scale-110"
                     referrerPolicy="no-referrer"
                     :alt="activeLocation.name">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-transparent to-transparent"></div>
                <div class="absolute bottom-4 lg:bottom-6 left-6 lg:left-8 transition-opacity duration-200" :class="detailScrolled ? 'opacity-0' : 'opacity-100'">
                    <span class="text-[8px] lg:text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1 block" x-text="activeLocation.transport"></span>
                    <h2 class="text-2xl lg:text-3xl font-serif italic text-white" x-text="activeLocation.name"></h2>
                </div>
            </div>

            <!-- Tab Bar (only when sub-locations exist) -->
            <div x-show="activeLocation.subLocations?.length > 0" class="flex border-b border-white/10 px-6 flex-none">
                <button
                    @click="detailMode = 'overview'"
                    class="px-4 py-2.5 text-[11px] font-bold transition-colors border-b-2 -mb-px"
                    :class="detailMode === 'overview' ? 'text-white border-blue-400' : 'text-slate-500 border-transparent hover:text-slate-300'"
                >Tổng quan</button>
                <button
                    @click="detailMode = 'detail'"
                    class="px-4 py-2.5 text-[11px] font-bold transition-colors border-b-2 -mb-px"
                    :class="detailMode === 'detail' ? 'text-white border-emerald-400' : 'text-slate-500 border-transparent hover:text-slate-300'"
                >Lịch trình</button>
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-6 lg:p-8 space-y-6 lg:space-y-8"
                 @scroll="detailScrolled = $el.scrollTop > 30">

                <!-- Detail mode: numbered sub-location list -->
                <template x-if="detailMode === 'detail' && activeLocation.subLocations?.length > 0">
                    <div class="space-y-3">
                        <template x-for="(sub, idx) in activeLocation.subLocations" :key="sub.id">
                            <div class="flex items-start gap-4 bg-white/5 rounded-2xl p-4 border border-white/5">
                                <div class="w-8 h-8 rounded-full bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center flex-none">
                                    <span class="text-[11px] font-bold text-emerald-400" x-text="idx + 1"></span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-bold text-white" x-text="sub.name"></p>
                                    <p class="text-[10px] text-emerald-400 mt-0.5" x-text="sub.durationMinutes + ' phút'"></p>
                                    <p x-show="sub.description" class="text-[11px] text-slate-400 mt-1 leading-relaxed" x-text="sub.description"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Overview mode (default content) -->
                <template x-if="detailMode === 'overview' || !activeLocation.subLocations?.length">
                <div class="space-y-6 lg:space-y-8">

                <!-- Description -->
                <div>
                    <p class="text-xs lg:text-sm text-slate-400 leading-relaxed" x-text="activeLocation.description"></p>
                </div>

                <!-- Hint: switch to itinerary tab -->
                <template x-if="activeLocation.subLocations?.length > 0">
                    <button
                        @click="detailMode = 'detail'"
                        class="w-full flex items-center justify-between gap-3 bg-emerald-950/40 hover:bg-emerald-900/50 border border-emerald-700/30 hover:border-emerald-500/50 rounded-2xl p-3.5 transition-all group"
                    >
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center flex-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </div>
                            <div class="text-left">
                                <p class="text-[11px] font-bold text-emerald-400" x-text="activeLocation.subLocations.length + ' địa điểm tham quan'"></p>
                                <p class="text-[10px] text-slate-500">Xem tab Lịch trình để biết chi tiết</p>
                            </div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-500 group-hover:text-emerald-400 group-hover:translate-x-0.5 transition-all flex-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </template>

                <!-- Bento Grid Info -->
                <div class="grid grid-cols-2 gap-3 lg:gap-4">
                    <div class="bg-white/5 rounded-2xl p-3 lg:p-4 border border-white/5">
                        <p class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1 lg:mb-2">Thời gian</p>
                        <p class="text-xs lg:text-sm font-bold text-white" x-text="activeLocation.duration + ' Ngày'"></p>
                        <p class="text-[10px] text-slate-400 mt-1" x-text="formatDateRangeCompact(activeLocation.dateRange)"></p>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-3 lg:p-4 border border-white/5">
                        <p class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1 lg:mb-2">Di chuyển</p>
                        <p class="text-xs lg:text-sm font-bold text-white" x-text="activeLocation.transport"></p>
                    </div>
                </div>

                <!-- Cost Calculator -->
                <div class="bg-blue-600/10 rounded-2xl lg:rounded-3xl p-5 lg:p-6 border border-blue-500/20">
                    <div class="flex items-center justify-between mb-4 lg:mb-6">
                        <h4 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Dự toán chi phí</h4>
                        <i data-lucide="calculator" class="w-4 h-4 text-blue-400"></i>
                    </div>

                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Người lớn</p>
                                <p class="text-[10px] font-medium text-slate-300" x-text="formatCurrency(activeLocation.adultPrice)"></p>
                            </div>
                            <div class="flex items-center gap-2 lg:gap-3 bg-white/5 rounded-xl p-1">
                                <button @click="activeLocation.adults = Math.max(1, activeLocation.adults - 1)" class="w-6 h-6 lg:w-7 lg:h-7 flex items-center justify-center hover:bg-white/10 rounded-lg transition-all">-</button>
                                <span class="w-4 text-center text-[10px] lg:text-xs font-bold" x-text="activeLocation.adults"></span>
                                <button @click="activeLocation.adults++" class="w-6 h-6 lg:w-7 lg:h-7 flex items-center justify-center hover:bg-white/10 rounded-lg transition-all">+</button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Trẻ em</p>
                                <p class="text-[10px] font-medium text-slate-300" x-text="formatCurrency(activeLocation.childPrice)"></p>
                            </div>
                            <div class="flex items-center gap-2 lg:gap-3 bg-white/5 rounded-xl p-1">
                                <button @click="activeLocation.children = Math.max(0, activeLocation.children - 1)" class="w-6 h-6 lg:w-7 lg:h-7 flex items-center justify-center hover:bg-white/10 rounded-lg transition-all">-</button>
                                <span class="w-4 text-center text-[10px] lg:text-xs font-bold" x-text="activeLocation.children"></span>
                                <button @click="activeLocation.children++" class="w-6 h-6 lg:w-7 lg:h-7 flex items-center justify-center hover:bg-white/10 rounded-lg transition-all">+</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 pt-2 border-t border-white/10">
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Lưu trú/đêm</p>
                                <p class="text-[10px] font-medium text-slate-300" x-text="formatCurrency(activeLocation.stayCostPerNight || 0)"></p>
                            </div>
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Ăn uống/ngày</p>
                                <p class="text-[10px] font-medium text-slate-300" x-text="formatCurrency(activeLocation.foodBudgetPerDay || 0)"></p>
                            </div>
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Vé xe chặng này</p>
                                <p class="text-[10px] font-medium text-slate-300" x-text="formatCurrency(activeLocation.transportFare || 0)"></p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 lg:mt-6 pt-4 lg:pt-6 border-t border-white/10 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-slate-400">Tổng cộng</span>
                        <span class="text-lg lg:text-xl font-bold text-white font-display" x-text="formatCurrency(calculateLocationCost(activeLocation))"></span>
                    </div>
                </div>

                <!-- Activities -->
                <div>
                    <h4 class="text-[9px] lg:text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 lg:mb-4">Hoạt động nổi bật</h4>
                    <div class="space-y-2 lg:space-y-3">
                        <template x-for="act in activeLocation.activities" :key="act">
                            <div class="flex items-center gap-3 text-xs lg:text-sm text-slate-300">
                                <div class="w-1.5 h-1.5 rounded-full bg-blue-500 flex-none"></div>
                                <span x-text="act"></span>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Food -->
                <div>
                    <h4 class="text-[9px] lg:text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 lg:mb-4">Ẩm thực nên thử</h4>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="food in activeLocation.food" :key="food">
                            <span class="px-3 py-1.5 bg-white/5 rounded-full text-[9px] lg:text-[10px] font-bold text-slate-300 border border-white/5" x-text="food"></span>
                        </template>
                    </div>
                </div>

                </div>
                </template>

            </div>

        </div>
    </main>

    <!-- Bottom Status Bar -->
    <footer class="fixed bottom-4 lg:bottom-6 left-4 lg:left-6 right-4 lg:right-6 z-40 pointer-events-none status-bar">
        <div class="glass rounded-2xl lg:rounded-3xl p-3 lg:p-4 flex justify-between items-center pointer-events-auto shadow-2xl border-white/5">
            <div class="flex items-center gap-3 lg:gap-6">
                <div class="flex flex-col">
                    <span class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider">Thời gian dự kiến</span>
                    <span class="text-xs lg:text-sm font-bold text-white" x-text="currentPlan.dateRange"></span>
                </div>
                <div class="w-px h-6 lg:h-8 bg-white/10"></div>
                <div class="flex flex-col">
                    <span class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider">Tổng ngân sách</span>
                    <span class="text-xs lg:text-sm font-bold text-blue-400" x-text="formatCurrency(calculateTotalPlanCost())"></span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <a href="/admin" class="w-8 h-8 lg:w-10 lg:h-10 rounded-xl flex items-center justify-center transition-all bg-white/5 hover:bg-white/10" title="Quản trị admin">
                    <i data-lucide="shield-check" class="w-3 h-3 lg:w-4 lg:h-4"></i>
                </a>
                <button @click="printPlan()" class="w-8 h-8 lg:w-10 lg:h-10 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all">
                    <i data-lucide="printer" class="w-3 h-3 lg:w-4 lg:h-4"></i>
                </button>
                <button @click="sharePlan()" class="w-8 h-8 lg:w-10 lg:h-10 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all">
                    <i data-lucide="share-2" class="w-3 h-3 lg:w-4 lg:h-4"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        function travelApp() {
            return {
                currentPlanId: null,
                activeId: null,
                detailScrolled: false,
                detailMode: 'overview',
                map: null,
                markers: {},
                polyline: null,
                plans: {},

                get currentPlan() {
                    return this.plans[this.currentPlanId] || { locations: [] };
                },

                get activeLocation() {
                    if (!this.currentPlan.locations.length) return {};
                    return this.currentPlan.locations.find(l => l.id === this.activeId) || this.currentPlan.locations[0];
                },

                async init() {
                    lucide.createIcons();

                    try {
                        let plansData = {};

                        try {
                            const listRes = await fetch('/api/plans');
                            if (!listRes.ok) throw new Error('API unavailable');
                            const planList = await listRes.json();

                            for (const summary of planList) {
                                const planRes = await fetch(`/api/plans/${summary.slug}`);
                                if (!planRes.ok) continue;
                                const full = await planRes.json();
                                plansData[full.slug] = {
                                    name: full.name,
                                    slug: full.slug,
                                    dateRange: full.dateRange,
                                    locations: full.locations,
                                };
                            }
                        } catch {
                            // Fallback to plans.json (GitHub Pages)
                            const response = await fetch('./plans.json');
                            const legacy = await response.json();
                            for (const [key, plan] of Object.entries(legacy)) {
                                const slug = plan.slug || key;
                                plansData[slug] = plan;
                            }
                        }

                        this.plans = plansData;

                        const slugKeys = Object.keys(this.plans);
                        if (!slugKeys.length) return;

                        const url = new URL(window.location.href);
                        const slugParam = url.searchParams.get('slug') || url.searchParams.get('plan');
                        if (slugParam && this.plans[slugParam]) {
                            this.currentPlanId = slugParam;
                        } else {
                            this.currentPlanId = slugKeys[0];
                        }

                        const firstLoc = this.currentPlan.locations?.[0];
                        this.activeId = firstLoc?.id ?? null;

                        this.$nextTick(() => {
                            this.initMap();
                        });
                    } catch (e) {
                        console.error("Lỗi khi tải dữ liệu kế hoạch:", e);
                    }

                    this.$watch('activeId', () => {
                        this.detailScrolled = false;
                        this.detailMode = 'overview';
                        this.$nextTick(() => lucide.createIcons());
                        this.updateMap();
                    });
                    this.$watch('detailMode', () => {
                        this.updateMap();
                    });
                    this.$watch('currentPlanId', () => {
                        this.$nextTick(() => lucide.createIcons());
                        this.updateMap();
                        this.syncPlanSlugToUrl();
                    });

                    this.syncPlanSlugToUrl();
                },

                initMap() {
                    this.map = L.map('map', {
                        zoomControl: false,
                        attributionControl: false
                    });
                    
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(this.map);

                    if (this.plans[this.currentPlanId]) {
                        this.changePlan(this.currentPlanId);
                    } else if (Object.keys(this.plans).length > 0) {
                        this.changePlan(Object.keys(this.plans)[0]);
                    }
                },

                async updateMap(fitBounds = false) {
                    if (!this.map) return;

                    Object.values(this.markers).forEach(m => this.map.removeLayer(m));
                    this.markers = {};
                    if (this.polyline) this.map.removeLayer(this.polyline);

                    const isDetail = this.detailMode === 'detail' && this.activeLocation?.subLocations?.length > 0;

                    if (isDetail) {
                        // Detail mode: show sub-location markers for active location
                        const subs = this.activeLocation.subLocations;
                        const points = [];
                        subs.forEach((sub, index) => {
                            const marker = L.marker([sub.lat, sub.lng], {
                                icon: L.divIcon({
                                    className: 'custom-div-icon',
                                    html: `
                                        <div class="relative group">
                                            <div class="w-8 h-8 bg-emerald-600 rounded-full border-2 border-white shadow-xl flex items-center justify-center text-white font-bold text-xs">
                                                ${index + 1}
                                            </div>
                                            <div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-white text-slate-900 px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity shadow-lg pointer-events-none">
                                                ${sub.name}
                                            </div>
                                        </div>
                                    `,
                                    iconSize: [32, 32],
                                    iconAnchor: [16, 16]
                                })
                            }).addTo(this.map);
                            this.markers[sub.id] = marker;
                            points.push([sub.lat, sub.lng]);
                        });

                        if (points.length > 1) {
                            const mapCoords = subs.map(s => `${s.lng},${s.lat}`).join(';');
                            try {
                                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${mapCoords}?overview=full&geometries=geojson`);
                                const data = await response.json();
                                if (data.routes && data.routes.length > 0) {
                                    this.polyline = L.geoJSON(data.routes[0].geometry, {
                                        style: { color: '#10b981', weight: 3, opacity: 0.7, dashArray: '8, 8', lineJoin: 'round' }
                                    }).addTo(this.map);
                                } else {
                                    throw new Error('no route');
                                }
                            } catch {
                                this.polyline = L.polyline(points, { color: '#10b981', weight: 3, opacity: 0.7, dashArray: '8, 8' }).addTo(this.map);
                            }
                        }

                        if (points.length > 0) {
                            const bounds = L.latLngBounds(points);
                            this.map.fitBounds(bounds, { padding: [60, 60] });
                        }
                        return;
                    }

                    // Overview mode: show all plan locations
                    const points = [];
                    this.currentPlan.locations.forEach((loc, index) => {
                        const isActive = loc.id === this.activeId;
                        const marker = L.marker([loc.lat, loc.lng], {
                            icon: L.divIcon({
                                className: 'custom-div-icon',
                                html: `
                                    <div class="relative group">
                                        <div class="w-8 h-8 ${isActive ? 'bg-blue-500 scale-125' : 'bg-slate-800'} rounded-full border-2 border-white shadow-xl flex items-center justify-center text-white font-bold text-xs transition-all duration-300">
                                            ${index + 1}
                                        </div>
                                        <div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-white text-slate-900 px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity shadow-lg pointer-events-none">
                                            ${loc.name}
                                        </div>
                                    </div>
                                `,
                                iconSize: [32, 32],
                                iconAnchor: [16, 16]
                            })
                        }).addTo(this.map);

                        marker.on('click', () => this.setActive(loc.id));
                        this.markers[loc.id] = marker;
                        points.push([loc.lat, loc.lng]);
                    });

                    const mapCoords = this.currentPlan.locations.map(loc => `${loc.lng},${loc.lat}`).join(';');

                    try {
                        const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${mapCoords}?overview=full&geometries=geojson`);
                        const data = await response.json();

                        if (data.routes && data.routes.length > 0) {
                            this.polyline = L.geoJSON(data.routes[0].geometry, {
                                style: {
                                    color: '#3b82f6',
                                    weight: 3,
                                    opacity: 0.6,
                                    dashArray: '10, 10',
                                    lineJoin: 'round'
                                }
                            }).addTo(this.map);
                        } else {
                            throw new Error('Không có route từ OSRM');
                        }
                    } catch (error) {
                        console.error('Lỗi khi vẽ route đường bộ, fallback về đường thẳng:', error);
                        this.polyline = L.polyline(points, {
                            color: '#3b82f6',
                            weight: 3,
                            opacity: 0.6,
                            dashArray: '10, 10',
                            lineJoin: 'round'
                        }).addTo(this.map);
                    }

                    if (fitBounds && this.polyline) {
                        this.map.fitBounds(this.polyline.getBounds(), { padding: [50, 50] });
                    } else if (this.activeId) {
                        const loc = this.activeLocation;
                        this.map.flyTo([loc.lat, loc.lng], 13, { duration: 1.5 });
                    }
                },

                setActive(id) {
                    this.activeId = id;
                    this.updateMap(false);
                },

                changePlan(planId) {
                    if (planId) this.currentPlanId = planId;
                    const firstLoc = this.currentPlan.locations?.[0];
                    this.activeId = firstLoc?.id ?? null;
                    this.$nextTick(() => {
                        this.updateMap(true);
                    });
                },

                syncPlanSlugToUrl() {
                    const plan = this.currentPlan;
                    if (!plan) return;

                    const url = new URL(window.location.href);
                    url.searchParams.delete('plan');
                    url.searchParams.set('slug', this.currentPlanId);
                    window.history.replaceState({}, '', url);
                },

                formatCurrency(value) {
                    return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(value);
                },

                formatNumberInput(value) {
                    const numberValue = Number(value || 0);
                    return new Intl.NumberFormat('vi-VN').format(numberValue);
                },

                parseNumberInput(value) {
                    const normalized = String(value ?? '').replace(/[^\d]/g, '');
                    const parsed = Number(normalized);
                    return Number.isFinite(parsed) ? parsed : 0;
                },

                updateMoneyField(target, key, rawValue) {
                    if (!target) return;
                    target[key] = Math.max(0, this.parseNumberInput(rawValue));
                },

                parseDateTimeLocal(value) {
                    if (!value) return null;
                    const date = new Date(value);
                    return Number.isNaN(date.getTime()) ? null : date;
                },

                parseDateRange(dateRange) {
                    const raw = String(dateRange || '');
                    const [startPart, endPart] = raw.split(' - ');
                    const parsePart = (part) => {
                        if (!part) return null;
                        const [datePart, timePart = '00:00'] = part.trim().split(' ');
                        const [day, month, year] = (datePart || '').split('/').map(Number);
                        const [hour, minute] = (timePart || '').split(':').map(Number);
                        if (![day, month, year, hour, minute].every(Number.isFinite)) return null;
                        return new Date(year, month - 1, day, hour, minute);
                    };
                    return { start: parsePart(startPart), end: parsePart(endPart) };
                },

                toDateTimeLocalValue(date) {
                    if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
                    const pad = (n) => String(n).padStart(2, '0');
                    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
                },

                formatDateTimeDisplay(date) {
                    if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
                    const pad = (n) => String(n).padStart(2, '0');
                    return `${pad(date.getDate())}/${pad(date.getMonth() + 1)}/${date.getFullYear()} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
                },

                getDayOfYear(date) {
                    if (!(date instanceof Date) || Number.isNaN(date.getTime())) return null;
                    const start = new Date(date.getFullYear(), 0, 1);
                    const diff = date - start;
                    return Math.floor(diff / 86400000) + 1;
                },

                formatDateMeta(value) {
                    const date = this.parseDateTimeLocal(value);
                    if (!date) return '';
                    const weekday = date.toLocaleDateString('vi-VN', { weekday: 'long' });
                    const dayOfYear = this.getDayOfYear(date);
                    return `${weekday} · ngày thứ ${dayOfYear} trong năm`;
                },

                formatDateRangeCompact(dateRange) {
                    const { start, end } = this.parseDateRange(dateRange);
                    if (!start || !end) return String(dateRange || '');
                    const startLabel = this.formatDateTimeDisplay(start);
                    const endLabel = this.formatDateTimeDisplay(end);
                    const weekdayStart = start.toLocaleDateString('vi-VN', { weekday: 'short' });
                    const weekdayEnd = end.toLocaleDateString('vi-VN', { weekday: 'short' });
                    return `${weekdayStart} ${startLabel} → ${weekdayEnd} ${endLabel}`;
                },

                calculateLocationCost(loc) {
                    if (!loc) return 0;
                    const days = typeof loc.duration === 'number' ? loc.duration : 1;
                    const adults = loc.adults || 0;
                    const children = loc.children || 0;

                    const travelerCost = ((loc.adultPrice || 0) * adults) + ((loc.childPrice || 0) * children);
                    const dailyTravelerCost = travelerCost * days;
                    const stayCost = (loc.stayCostPerNight || 0) * Math.max(days - 1, 0);
                    const foodCost = (loc.foodBudgetPerDay || 0) * days;
                    const transportFare = loc.transportFare || 0;

                    return dailyTravelerCost + stayCost + foodCost + transportFare;
                },

                calculateTotalPlanCost(plan = this.currentPlan) {
                    if (!plan || !plan.locations) return 0;
                    return plan.locations.reduce((total, loc) => {
                        return total + this.calculateLocationCost(loc);
                    }, 0);
                },

                sharePlan() {
                    const shareUrl = new URL(window.location.href);
                    if (this.currentPlan?.slug) {
                        shareUrl.searchParams.delete('plan');
                        shareUrl.searchParams.set('slug', this.currentPlan.slug);
                    } else {
                        shareUrl.searchParams.delete('slug');
                        shareUrl.searchParams.set('plan', this.currentPlanId);
                    }
                    const text = `Lịch trình ${this.currentPlan.name}`;

                    if (navigator.share) {
                        navigator.share({
                            title: this.currentPlan.name,
                            text,
                            url: shareUrl.toString(),
                        }).catch(() => {});
                        return;
                    }

                    navigator.clipboard.writeText(shareUrl.toString())
                        .then(() => alert('Đã copy link chia sẻ vào clipboard'))
                        .catch(() => alert(shareUrl.toString()));
                },

                printPlan() {
                    const plan = this.currentPlan;
                    if (!plan || !Array.isArray(plan.locations) || plan.locations.length === 0) return;

                    const escapeHtml = (value) => String(value ?? '')
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#39;');

                    const formatMoney = (value) => new Intl.NumberFormat('vi-VN', {
                        style: 'currency',
                        currency: 'VND'
                    }).format(Number(value || 0));

                    const rowsHtml = plan.locations.map((loc, index) => {
                        const cost = this.calculateLocationCost(loc);
                        const stayDays = typeof loc.duration === 'number' ? `${loc.duration} ngày` : String(loc.duration || '');
                        return `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${escapeHtml(loc.name)}</td>
                                <td>${escapeHtml(loc.province || '')}</td>
                                <td>${escapeHtml(loc.dateRange || '')}</td>
                                <td>${escapeHtml(stayDays)}</td>
                                <td>${escapeHtml(loc.transport)}</td>
                                <td>${escapeHtml(loc.highlight)}</td>
                                <td class="money">${formatMoney(loc.transportFare || 0)}</td>
                                <td class="money">${formatMoney(loc.stayCostPerNight || 0)}</td>
                                <td class="money">${formatMoney(loc.foodBudgetPerDay || 0)}</td>
                                <td>${escapeHtml((loc.activities || []).join(', '))}</td>
                                <td>${escapeHtml((loc.food || []).join(', '))}</td>
                                <td class="num">${Number(loc.adults || 0)}</td>
                                <td class="num">${Number(loc.children || 0)}</td>
                                <td class="money">${formatMoney(cost)}</td>
                            </tr>
                        `;
                    }).join('');

                    const totalCost = formatMoney(this.calculateTotalPlanCost(plan));
                    const generatedAt = new Date().toLocaleString('vi-VN');

                    const html = `
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>In kế hoạch - ${escapeHtml(plan.name)}</title>
  <style>
    @page {
      size: A4 landscape;
      margin: 8mm;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;

    }

    }

      display: flex;

    }

    }

    }

      width: 100%;

    }

</head>
<body>
  <div class="sheet">
    <div class="header">
      <div>
        <h1 class="title">BẢNG KẾ HOẠCH DU LỊCH</h1>
        <p class="sub">${escapeHtml(plan.name)}</p>
      </div>
      <div class="sub">In lúc: ${escapeHtml(generatedAt)}</div>
    </div>

    <div class="meta">
      <div class="meta-item"><b>Tuyến:</b> ${escapeHtml(plan.name)}</div>
      <div class="meta-item"><b>Ngày dự kiến:</b> ${escapeHtml(plan.dateRange || '')}</div>
      <div class="meta-item"><b>Tổng ngân sách:</b> ${escapeHtml(totalCost)}</div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width:30px">#</th>
          <th style="width:90px">Địa điểm</th>
          <th style="width:90px">Tỉnh/TP</th>
          <th style="width:95px">Ngày tháng</th>

          <th style="width:72px">Ăn/ngày</th>
          <th>Hoạt động</th>
          <th>Ẩm thực</th>

          <th style="width:36px">TE</th>
          <th style="width:86px">Thành tiền</th>
        </tr>
      </thead>
      <tbody>
        ${rowsHtml}
      </tbody>

  </div>

</html>`;

                    const printWindow = window.open('', '_blank', 'width=1200,height=900');
                    if (!printWindow) {
                        alert('Trình duyệt đang chặn popup. Vui lòng cho phép popup để in.');
                        return;
                    }

                    printWindow.document.open();
                    printWindow.document.write(html);
                    printWindow.document.close();
                },

                addToCalendar() {
                    const loc = this.activeLocation;
                    if (!loc || !loc.name) return;

                    const now = new Date();
                    const start = new Date(now.getTime() + 60 * 60 * 1000);
                    const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);

                    const formatDate = (date) => {
                        const pad = (value) => String(value).padStart(2, '0');
                        return `${date.getUTCFullYear()}${pad(date.getUTCMonth() + 1)}${pad(date.getUTCDate())}T${pad(date.getUTCHours())}${pad(date.getUTCMinutes())}${pad(date.getUTCSeconds())}Z`;
                    };

                    const details = [
                        loc.description || '',
                        `Di chuyển: ${loc.transport || 'N/A'}`,
                        `Điểm nổi bật: ${loc.highlight || 'N/A'}`,
                    ].join('\n');

                    const calendarUrl = new URL('https://calendar.google.com/calendar/render');
                    calendarUrl.searchParams.set('action', 'TEMPLATE');
                    calendarUrl.searchParams.set('text', loc.name);
                    calendarUrl.searchParams.set('details', details);
                    calendarUrl.searchParams.set('location', `${loc.name}, Việt Nam`);
                    calendarUrl.searchParams.set('dates', `${formatDate(start)}/${formatDate(end)}`);

                    window.open(calendarUrl.toString(), '_blank', 'noopener,noreferrer');
                },

            }
        }
    </script>
</body>
