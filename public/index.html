<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viet Roadtrips - Kế hoạch xuyên tỉnh của bạn</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .font-display { font-family: var(--font-display); }
        .font-serif { font-family: var(--font-serif); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .leaflet-container {
            background: #0f172a !important;
        }

        .timeline-item::after { display: none; }

        @keyframes route-flow {
            0%   { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -30; }
        }

        @keyframes map-scan {
            0%   { transform: translateY(-100%); opacity: 0; }
            8%   { opacity: 1; }
            92%  { opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }
        @keyframes dot-pulse {
            0%, 100% { opacity: 0.25; transform: scale(0.75); }
            50%       { opacity: 1;    transform: scale(1); }
        }

        [x-cloak] { display: none !important; }

        /* Animations */
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            #map { height: 250px; position: sticky; top: 0; z-index: 10; }
            .fixed:not(header) { position: relative !important; top: auto !important; left: auto !important; right: auto !important; bottom: auto !important; width: 100% !important; }
            header.fixed { position: sticky !important; top: 0; z-index: 60; background: #0f172a; padding: 0.75rem !important; }
            .timeline-rail { display: none !important; }
            .mobile-timeline { 
                display: flex !important; 
                position: sticky; 
                top: 250px; 
                z-index: 20; 
                background: #0f172a; 
                padding: 0.75rem; 
                border-bottom: 1px solid rgba(255,255,255,0.1);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            }
            .detail-panel { margin-top: 0 !important; padding: 0 !important; }
            .detail-panel > div { border-radius: 0 !important; height: auto !important; min-height: 50vh; }
            .status-bar { position: sticky !important; bottom: 0; margin: 0 !important; width: 100% !important; z-index: 50; }
            .status-bar > div { border-radius: 0 !important; border-left: none; border-right: none; border-bottom: none; }
            main { padding-bottom: 0; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="travelApp()" x-cloak>

    <!-- Plan loading overlay -->
    <div x-show="planLoading"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm">
        <div class="glass rounded-2xl px-6 py-4 flex items-center gap-3 shadow-2xl">
            <div class="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-sm font-medium text-slate-300">Đang tải kế hoạch...</span>
        </div>
    </div>

    <!-- Background Map -->
    <div id="map"></div>

    <!-- Map Loading Screen -->
    <div x-show="!mapReady"
         x-transition:leave="transition ease-in-out duration-700"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-[30] overflow-hidden"
         style="background:#0f172a">
        <!-- Tile grid background -->
        <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:64px 64px"></div>
        <!-- Scan sweep -->
        <div style="position:absolute;left:0;right:0;height:280px;background:linear-gradient(to bottom,transparent,rgba(59,130,246,0.04),rgba(59,130,246,0.07),rgba(59,130,246,0.04),transparent);animation:map-scan 2.8s ease-in-out infinite"></div>
        <!-- Center branding -->
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px">
            <div style="width:60px;height:60px;background:white;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(59,130,246,0.25),0 16px 32px rgba(0,0,0,0.6)">
                <i data-lucide="compass" style="width:28px;height:28px;color:#0f172a"></i>
            </div>
            <div style="text-align:center">
                <p style="font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:#f8fafc;letter-spacing:-0.02em">Viet Roadtrips</p>
                <p style="font-size:10px;color:#475569;margin-top:5px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600">Đang tải bản đồ</p>
            </div>
            <div style="display:flex;gap:5px;margin-top:4px">
                <div style="width:5px;height:5px;border-radius:50%;background:#3b82f6;animation:dot-pulse 1.1s ease-in-out infinite;animation-delay:0s"></div>
                <div style="width:5px;height:5px;border-radius:50%;background:#3b82f6;animation:dot-pulse 1.1s ease-in-out infinite;animation-delay:0.18s"></div>
                <div style="width:5px;height:5px;border-radius:50%;background:#3b82f6;animation:dot-pulse 1.1s ease-in-out infinite;animation-delay:0.36s"></div>
            </div>
        </div>
    </div>

    <!-- Top Navigation -->
    <header class="fixed top-0 left-0 w-full z-50 p-4 lg:p-6 flex flex-col lg:flex-row justify-between items-center gap-4 pointer-events-none">
        <div class="flex items-center gap-4 pointer-events-auto w-full lg:w-auto cursor-pointer" @click="activeId = null">
            <div class="w-10 h-10 lg:w-12 lg:h-12 bg-white rounded-2xl flex items-center justify-center text-slate-900 shadow-2xl">
                <i data-lucide="compass" class="w-5 h-5 lg:w-6 lg:h-6"></i>
            </div>
            <div class="glass px-4 py-2 rounded-2xl flex-1 lg:flex-none">
                <h1 class="text-base lg:text-lg font-bold font-display tracking-tight">Viet Roadtrips</h1>
                <p class="text-[8px] lg:text-[10px] font-bold text-blue-400 uppercase tracking-widest">Premium Planner</p>
            </div>
        </div>

        <div class="flex items-center gap-3 pointer-events-auto w-full lg:w-auto overflow-x-auto pb-2 lg:pb-0 no-scrollbar">
            <div class="glass p-1 rounded-2xl flex gap-1 whitespace-nowrap">
                <template x-for="plan in planList" :key="plan.slug">
                    <button @click="changePlan(plan.slug)"
                            class="px-3 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all"
                            :class="currentPlanId === plan.slug ? 'bg-white text-slate-900' : 'text-slate-400 hover:text-white'">
                        <span x-text="plan.name"></span>
                    </button>
                </template>
            </div>
        </div>
    </header>

    <!-- Left Timeline Rail (Desktop) -->
    <aside class="fixed left-6 top-28 bottom-28 w-64 z-40 flex flex-col gap-4 pointer-events-none timeline-rail lg:flex hidden">
        <div class="glass rounded-3xl p-6 flex-1 overflow-y-auto pointer-events-auto shadow-2xl">
            <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-6">Lộ trình chi tiết</h2>
            <div class="space-y-8">
                <template x-for="(loc, index) in currentPlan.locations" :key="loc.id">
                    <div class="relative timeline-item group cursor-pointer" @click="setActive(loc.id)">
                            <div class="flex items-start gap-4">
                                <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center flex-none transition-all duration-300"
                                     :class="activeId === loc.id ? 'bg-white border-white text-slate-900 scale-110' : 'bg-slate-900 border-slate-700 text-slate-500 group-hover:border-slate-500'">
                                    <span class="text-[10px] font-bold" x-text="index + 1"></span>
                                </div>
                                <div class="pt-1 flex-1 min-w-0">
                                    <div class="flex items-center gap-2 mb-0.5">
                                        <h3 class="text-sm font-bold transition-colors truncate" :class="activeId === loc.id ? 'text-white' : 'text-slate-400 group-hover:text-slate-200'" x-text="loc.name"></h3>
                                        <span class="text-[9px] font-bold px-1.5 py-0.5 rounded-md flex-none transition-colors"
                                              :class="activeId === loc.id ? 'bg-white/20 text-white' : 'bg-white/5 text-slate-500'"
                                              x-text="loc.duration > 0 ? loc.duration + ' ngày' : '—'"></span>
                                    </div>
                                    <div class="space-y-0.5 mt-1">
                                        <div class="flex items-center gap-1.5">
                                            <span class="text-[8px] font-bold text-green-500 uppercase w-6 flex-none">Đến</span>
                                            <span class="text-[9px] text-slate-500" x-text="formatDateArrival(loc.dateRange)"></span>
                                        </div>
                                        <div class="flex items-center gap-1.5">
                                            <span class="text-[8px] font-bold text-orange-500 uppercase w-6 flex-none">Đi</span>
                                            <span class="text-[9px] text-slate-500" x-text="formatDateDeparture(loc.dateRange)"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                    </div>
                </template>
            </div>
        </div>
    </aside>

    <!-- Mobile Timeline (Horizontal) -->
    <div class="lg:hidden mobile-timeline hidden overflow-x-auto gap-3 no-scrollbar">
        <template x-for="(loc, index) in currentPlan.locations" :key="loc.id">
            <button @click="setActive(loc.id)"
                    class="glass px-4 py-2 rounded-xl flex items-center gap-2 whitespace-nowrap transition-all flex-none"
                    :class="activeId === loc.id ? 'bg-white text-slate-900' : 'text-slate-400 border-white/5'">
                <span class="text-[10px] font-bold" x-text="index + 1"></span>
                <span class="text-[10px] font-bold" x-text="loc.name"></span>
            </button>
        </template>
    </div>

    <!-- Right Detail Panel -->
    <main class="fixed right-6 top-28 bottom-28 w-[450px] z-40 pointer-events-none detail-panel" :class="activeId ? 'block' : 'hidden'">
        <div class="glass rounded-[2rem] lg:rounded-[2.5rem] h-full flex flex-col overflow-hidden pointer-events-auto shadow-2xl border-white/5 slide-up relative">
            
            <!-- Close Button (Mobile Only) -->
            <button @click="activeId = null" class="lg:hidden absolute top-4 right-4 z-50 w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            
            <!-- Hero Image -->
            <div class="relative flex-none overflow-hidden transition-[height] duration-300 ease-in-out"
                 :style="detailScrolled ? 'height: 3rem' : 'height: 14rem'">
                <img :src="`https://loremflickr.com/800/600/${activeLocation.name.replace(/\s+/g, ',')},vietnam,travel`"
                     class="w-full h-full object-cover transition-transform duration-1000 hover:scale-110"
                     referrerPolicy="no-referrer"
                     :alt="activeLocation.name">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-transparent to-transparent"></div>
                <div class="absolute bottom-4 lg:bottom-6 left-6 lg:left-8 transition-opacity duration-200" :class="detailScrolled ? 'opacity-0' : 'opacity-100'">
                    <span class="text-[8px] lg:text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1 block" x-text="activeLocation.transport"></span>
                    <h2 class="text-2xl lg:text-3xl font-serif italic text-white" x-text="activeLocation.name"></h2>
                </div>
            </div>

            <!-- Tab Bar (only when sub-locations exist) -->
            <div x-show="activeLocation.subLocations?.length > 0" class="flex border-b border-white/10 px-6 flex-none">
                <button
                    @click="detailMode = 'overview'"
                    class="px-4 py-2.5 text-[11px] font-bold transition-colors border-b-2 -mb-px"
                    :class="detailMode === 'overview' ? 'text-white border-blue-400' : 'text-slate-500 border-transparent hover:text-slate-300'"
                >Tổng quan</button>
                <button
                    @click="detailMode = 'detail'"
                    class="px-4 py-2.5 text-[11px] font-bold transition-colors border-b-2 -mb-px"
                    :class="detailMode === 'detail' ? 'text-white border-emerald-400' : 'text-slate-500 border-transparent hover:text-slate-300'"
                >Lịch trình</button>
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-4 lg:p-6 space-y-3 lg:space-y-4"
                 x-ref="scrollContainer"
                 @scroll="if (!detailScrolled && $el.scrollTop > 30) detailScrolled = true;">

                <!-- Detail mode: numbered sub-location list -->
                <template x-if="detailMode === 'detail' && activeLocation.subLocations?.length > 0">
                    <div class="space-y-3">
                        <template x-for="(sub, idx) in activeLocation.subLocations" :key="sub.id">
                            <div class="flex items-start gap-4 bg-white/5 rounded-2xl p-4 border border-white/5">
                                <div class="w-8 h-8 rounded-full bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center flex-none">
                                    <span class="text-[11px] font-bold text-emerald-400" x-text="idx + 1"></span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-bold text-white" x-text="sub.name"></p>
                                    <div class="flex items-center gap-2 mt-0.5 flex-wrap">
                                        <p class="text-[10px] text-emerald-400" x-text="sub.durationMinutes + ' phút'"></p>
                                        <template x-if="sub.adultPrice > 0">
                                            <span class="text-[10px] text-amber-400 bg-amber-400/10 px-1.5 py-0.5 rounded-full" x-text="'NL: ' + formatCurrency(sub.adultPrice)"></span>
                                        </template>
                                        <template x-if="sub.childPrice > 0">
                                            <span class="text-[10px] text-sky-400 bg-sky-400/10 px-1.5 py-0.5 rounded-full" x-text="'TE: ' + formatCurrency(sub.childPrice)"></span>
                                        </template>
                                        <template x-if="sub.adultPrice === 0 && sub.childPrice === 0">
                                            <span class="text-[10px] text-green-400 bg-green-400/10 px-1.5 py-0.5 rounded-full">Miễn phí</span>
                                        </template>
                                    </div>
                                    <p x-show="sub.description" class="text-[11px] text-slate-400 mt-1 leading-relaxed" x-text="sub.description"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Overview mode (default content) -->
                <template x-if="detailMode === 'overview' || !activeLocation.subLocations?.length">
                <div class="space-y-3 lg:space-y-4">

                <!-- Description -->
                <div>
                    <p class="text-xs lg:text-sm text-slate-400 leading-relaxed" x-text="activeLocation.description"></p>
                </div>

                <!-- Vexere booking CTA -->
                <template x-if="activeLocation.vexereUrl">
                    <a :href="activeLocation.vexereUrl" target="_blank" rel="noopener"
                       class="w-full flex items-center justify-between gap-3 bg-orange-950/40 hover:bg-orange-900/50 border border-orange-700/30 hover:border-orange-500/50 rounded-2xl p-3.5 transition-all group">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-orange-600/20 border border-orange-500/30 flex items-center justify-center flex-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
                                </svg>
                            </div>
                            <div class="text-left">
                                <p class="text-[11px] font-bold text-orange-400" x-text="'Đặt vé xe — ' + (activeLocation.transport || 'Di chuyển')"></p>
                                <p class="text-[10px] text-slate-500">Mua vé trên Vexere</p>
                            </div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-500 group-hover:text-orange-400 group-hover:translate-x-0.5 transition-all flex-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                        </svg>
                    </a>
                </template>

                <!-- Hint: switch to itinerary tab -->
                <template x-if="activeLocation.subLocations?.length > 0">
                    <button
                        @click="detailMode = 'detail'"
                        class="w-full flex items-center justify-between gap-3 bg-emerald-950/40 hover:bg-emerald-900/50 border border-emerald-700/30 hover:border-emerald-500/50 rounded-2xl p-3.5 transition-all group"
                    >
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center flex-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </div>
                            <div class="text-left">
                                <p class="text-[11px] font-bold text-emerald-400" x-text="activeLocation.subLocations.length + ' địa điểm tham quan'"></p>
                                <p class="text-[10px] text-slate-500">Xem tab Lịch trình để biết chi tiết</p>
                            </div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-500 group-hover:text-emerald-400 group-hover:translate-x-0.5 transition-all flex-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </template>

                <!-- Bento Grid Info -->
                <div class="grid grid-cols-2 gap-3 lg:gap-4">
                    <!-- Card: Thời gian -->
                    <div class="bg-white/5 rounded-2xl p-3 lg:p-4 border border-white/5">
                        <p class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-2">Thời gian</p>
                        <p class="text-xs lg:text-sm font-bold text-white mb-2" x-text="(activeLocation.duration > 0 ? activeLocation.duration + ' ngày' : '—')"></p>
                        <div class="space-y-1">
                            <div class="flex items-center gap-1.5">
                                <span class="text-[8px] font-bold text-green-400 w-5 flex-none">Đến</span>
                                <span class="text-[10px] text-slate-300" x-text="formatDateArrival(activeLocation.dateRange)"></span>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <span class="text-[8px] font-bold text-orange-400 w-5 flex-none">Đi</span>
                                <span class="text-[10px] text-slate-300" x-text="formatDateDeparture(activeLocation.dateRange)"></span>
                            </div>
                        </div>
                    </div>
                    <!-- Card: Lưu trú (thay Di chuyển) -->
                    <div class="bg-white/5 rounded-2xl p-3 lg:p-4 border border-white/5 min-w-0">
                        <p class="text-[8px] lg:text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-2">Lưu trú</p>
                        <p class="text-xs lg:text-sm font-bold text-white leading-snug line-clamp-2" x-text="activeLocation.accommodationName || '—'"></p>
                        <template x-if="activeLocation.accommodationUrl">
                            <a x-bind:href="activeLocation.accommodationUrl.startsWith('http') ? activeLocation.accommodationUrl : null"
                               x-bind:target="activeLocation.accommodationUrl.startsWith('http') ? '_blank' : null"
                               class="text-[10px] mt-1 block truncate"
                               :class="activeLocation.accommodationUrl.startsWith('http') ? 'text-blue-400 underline' : 'text-slate-400'"
                               x-text="activeLocation.accommodationUrl"></a>
                        </template>
                        <template x-if="activeLocation.accommodationAddress && !activeLocation.accommodationUrl">
                            <p class="text-[10px] mt-1 text-slate-400 truncate" x-text="activeLocation.accommodationAddress"></p>
                        </template>
                    </div>
                </div>

                <!-- Cost Calculator -->
                <div class="bg-blue-600/10 rounded-2xl lg:rounded-3xl p-5 lg:p-6 border border-blue-500/20">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Dự toán chi phí</h4>
                        <i data-lucide="calculator" class="w-4 h-4 text-blue-400"></i>
                    </div>

                    <!-- Số người -->
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div class="bg-white/5 rounded-xl p-2.5 flex items-center justify-between">
                            <div>

    <!-- Bottom Status Bar -->

    <script>
        function travelApp() {
            return {
                currentPlanId: null,
                activeId: null,
                detailScrolled: false,
                detailMode: 'overview',
                map: null,
                markers: {},
                polyline: null,
                transportMarkers: [],
                mapReady: false,
                tileLayer: null,
                plans: {},       // cache: slug → full plan data
                planList: [],    // lightweight list: [{slug, name, dateRange}]
                planLoading: false,

                get currentPlan() {
                    return this.plans[this.currentPlanId] || { locations: [] };
                },

                get activeLocation() {
                    if (!this.currentPlan.locations.length) return {};
                    return this.currentPlan.locations.find(l => l.id === this.activeId) || this.currentPlan.locations[0];
                },

                // Getter có explicit dependency vào activeLocation.adults/children
                // để Alpine track mutation khi user chỉnh counter
                get totalPlanCost() {
                    const loc = this.activeLocation;
                    void loc?.adults;
                    void loc?.children;
                    return this.calculateTotalPlanCost();
                },

                async init() {
                    lucide.createIcons();

                    try {
                        const listRes = await fetch('/api/plans');
                        if (!listRes.ok) throw new Error('API unavailable');
                        this.planList = await listRes.json(); // chỉ load list nhẹ

                        if (!this.planList.length) return;

                        const url = new URL(window.location.href);
                        const slugParam = url.searchParams.get('slug') || url.searchParams.get('plan');
                        const initialSlug = (slugParam && this.planList.find(p => p.slug === slugParam))
                            ? slugParam
                            : this.planList[0].slug;

                        await this.changePlan(initialSlug); // lazy load plan đầu tiên
                    } catch (e) {
                        console.error("Lỗi khi tải dữ liệu kế hoạch:", e);
                    }

                    this.$watch('activeId', () => {
                        this.detailScrolled = false;
                        if (this.$refs.scrollContainer) this.$refs.scrollContainer.scrollTop = 0;
                        const loc = this.currentPlan?.locations?.find(l => l.id === this.activeId);
                        this.detailMode = loc?.subLocations?.length > 0 ? 'detail' : 'overview';
                        this.$nextTick(() => lucide.createIcons());
                        this.updateMap();
                    });
                    this.$watch('detailMode', () => {
                        this.updateMap();
                    });
                    this.$watch('currentPlanId', () => {
                        this.$nextTick(() => lucide.createIcons());
                        this.updateMap();
                        this.syncPlanSlugToUrl();
                    });

                    this.syncPlanSlugToUrl();
                },

                initMap() {
                    this.map = L.map('map', {
                        zoomControl: false,
                        attributionControl: false
                    });

                    this.tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap contributors',
                        keepBuffer: 4,
                        updateWhenIdle: false,
                    }).addTo(this.map);

                    if (this.plans[this.currentPlanId]) {
                        this.updateMap(true);
                    }
                },

                async updateMap(fitBounds = false) {
                    if (!this.map) return;

                    Object.values(this.markers).forEach(m => this.map.removeLayer(m));
                    this.markers = {};
                    if (this.polyline) this.map.removeLayer(this.polyline);
                    this.transportMarkers.forEach(m => this.map.removeLayer(m));
                    this.transportMarkers = [];

                    const isDetail = this.detailMode === 'detail' && this.activeLocation?.subLocations?.length > 0;

                    if (isDetail) {
                        // Detail mode: show sub-location markers for active location
                        const subs = this.activeLocation.subLocations;
                        const points = [];
                        subs.forEach((sub, index) => {
                            const marker = L.marker([sub.lat, sub.lng], {
                                icon: L.divIcon({
                                    className: 'custom-div-icon',
                                    html: `
                                        <div class="relative group">
                                            <div class="w-8 h-8 bg-emerald-600 rounded-full border-2 border-white shadow-xl flex items-center justify-center text-white font-bold text-xs">
                                                ${index + 1}
                                            </div>
                                            <div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-white text-slate-900 px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity shadow-lg pointer-events-none">
                                                ${sub.name}
                                            </div>
                                        </div>
                                    `,
                                    iconSize: [32, 32],
                                    iconAnchor: [16, 16]
                                })
                            }).addTo(this.map);
                            this.markers[sub.id] = marker;
                            points.push([sub.lat, sub.lng]);
                        });

                        if (points.length > 1) {
                            const mapCoords = subs.map(s => `${s.lng},${s.lat}`).join(';');
                            try {
                                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${mapCoords}?overview=full&geometries=geojson`);
                                const data = await response.json();
                                if (data.routes && data.routes.length > 0) {
                                    this.polyline = L.geoJSON(data.routes[0].geometry, {
                                        style: { color: '#10b981', weight: 3, opacity: 0.7, dashArray: '8, 8', lineJoin: 'round' }
                                    }).addTo(this.map);
                                } else {
                                    throw new Error('no route');
                                }
                            } catch {
                                this.polyline = L.polyline(points, { color: '#10b981', weight: 3, opacity: 0.7, dashArray: '8, 8' }).addTo(this.map);
                            }
                        }

                        if (points.length > 0) {
                            const bounds = L.latLngBounds(points);
                            this.map.fitBounds(bounds, { padding: [60, 60] });
                        }
                        return;
                    }

                    // Overview mode: show all plan locations
                    const points = [];
                    this.currentPlan.locations.forEach((loc, index) => {
                        const isActive = loc.id === this.activeId;
                        const marker = L.marker([loc.lat, loc.lng], {
                            icon: L.divIcon({
                                className: 'custom-div-icon',
                                html: `
                                    <div class="relative group">
                                        <div class="w-8 h-8 ${isActive ? 'bg-blue-500 scale-125' : 'bg-slate-800'} rounded-full border-2 border-white shadow-xl flex items-center justify-center text-white font-bold text-xs transition-all duration-300">
                                            ${index + 1}
                                        </div>
                                        <div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-white text-slate-900 px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity shadow-lg pointer-events-none">
                                            ${loc.name}
                                        </div>
                                    </div>
                                `,
                                iconSize: [32, 32],
                                iconAnchor: [16, 16]
                            })
                        }).addTo(this.map);

                        marker.on('click', () => this.setActive(loc.id));
                        this.markers[loc.id] = marker;
                        points.push([loc.lat, loc.lng]);
                    });

                    const mapCoords = this.currentPlan.locations.map(loc => `${loc.lng},${loc.lat}`).join(';');

                    const addTransportBadge = (lat, lng, loc) => {
                        const ms = this.getTransportMapStyle(loc.transportType);
                        const icon = this.getTransportIcon(loc.transportType);
                        const label = this.getTransportShortLabel(loc.transportType, loc.transport);
                        const badge = L.marker([lat, lng], {
                            icon: L.divIcon({
                                className: '',
                                html: `<div style="display:inline-flex;align-items:center;gap:5px;background:rgba(10,15,30,0.88);border:1.5px solid ${ms.border};color:${ms.color};border-radius:999px;padding:4px 10px 4px 8px;font-size:10px;font-weight:700;font-family:'Space Grotesk','Inter',sans-serif;box-shadow:0 2px 12px rgba(0,0,0,0.7),0 0 0 3px rgba(0,0,0,0.3);white-space:nowrap;backdrop-filter:blur(6px);transform:translate(-50%,-50%);pointer-events:none;letter-spacing:0.02em"><span style="font-size:14px;line-height:1">${icon}</span><span>${label}</span></div>`,
                                iconSize: [0, 0],
                                iconAnchor: [0, 0]
                            }),
                            interactive: false,
                            zIndexOffset: 200
                        }).addTo(this.map);
                        this.transportMarkers.push(badge);
                    };

                    try {
                        const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${mapCoords}?overview=full&geometries=geojson&steps=true`);
                        const data = await response.json();

                        if (data.routes && data.routes.length > 0) {
                            this.polyline = L.geoJSON(data.routes[0].geometry, {
                                style: {
                                    color: '#3b82f6',
                                    weight: 3,
                                    opacity: 0.7,
                                    dashArray: '12, 18',
                                    lineJoin: 'round'
                                }
                            }).addTo(this.map);

                            // Apply animation via inline style after next tick (Leaflet timing)
                            setTimeout(() => {
                                this.polyline.eachLayer(l => {
                                    const el = l._path;
                                    if (el) el.style.animation = 'route-flow 0.9s linear infinite';
                                });
                            }, 50);

                            // Place badges + direction arrows per leg
                            const legs = data.routes[0].legs || [];
                            this.currentPlan.locations.forEach((loc, idx) => {
                                if (idx === 0) return;
                                const leg = legs[idx - 1];
                                if (!leg?.steps?.length) return;
                                const coords = [];
                                leg.steps.forEach(step => {
                                    if (step.geometry?.coordinates) coords.push(...step.geometry.coordinates);
                                });
                                if (!coords.length) return;

                                // Transport badge at midpoint
                                const mid = coords[Math.floor(coords.length / 2)];
                                addTransportBadge(mid[1], mid[0], loc);

                                // Direction arrows at 20%, 40%, 60%, 80% along segment
                                [0.2, 0.4, 0.6, 0.8].forEach(p => {
                                    const i = Math.floor(p * (coords.length - 1));
                                    if (i <= 0 || i >= coords.length - 1) return;
                                    const [lng1, lat1] = coords[i - 1];
                                    const [lng2, lat2] = coords[i + 1];
                                    const dLng = (lng2 - lng1) * Math.PI / 180;
                                    const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
                                    const bearing = (Math.atan2(
                                        Math.sin(dLng) * Math.cos(φ2),
                                        Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(dLng)
                                    ) * 180 / Math.PI + 360) % 360;
                                    const [aLng, aLat] = coords[i];
                                    const arrow = L.marker([aLat, aLng], {
                                        icon: L.divIcon({
                                            className: '',
                                            html: `<span style="display:block;color:rgba(96,165,250,0.9);font-size:9px;line-height:1;transform:translate(-50%,-50%) rotate(${bearing}deg);pointer-events:none;filter:drop-shadow(0 1px 3px rgba(0,0,0,1))">▲</span>`,
                                            iconSize: [0, 0],
                                            iconAnchor: [0, 0]
                                        }),
                                        interactive: false,
                                        zIndexOffset: 100
                                    }).addTo(this.map);
                                    this.transportMarkers.push(arrow);
                                });
                            });
                        } else {
                            throw new Error('Không có route từ OSRM');
                        }
                    } catch (error) {
                        console.error('Lỗi khi vẽ route đường bộ, fallback về đường thẳng:', error);
                        this.polyline = L.polyline(points, {
                            color: '#3b82f6',
                            weight: 3,
                            opacity: 0.7,
                            dashArray: '12, 18',
                            lineJoin: 'round'
                        }).addTo(this.map);
                        if (this.polyline._path) this.polyline._path.style.animation = 'route-flow 0.9s linear infinite';
                        // Fallback badges at geographic midpoints
                        this.currentPlan.locations.forEach((loc, idx) => {
                            if (idx === 0) return;
                            const prev = this.currentPlan.locations[idx - 1];
                            if (!prev.lat || !prev.lng || !loc.lat || !loc.lng) return;
                            addTransportBadge((prev.lat + loc.lat) / 2, (prev.lng + loc.lng) / 2, loc);
                        });
                    }

                    if (fitBounds && this.polyline) {
                        this.map.fitBounds(this.polyline.getBounds(), { padding: [50, 50] });
                        // Đăng ký listener SAU khi fitBounds — lúc này Leaflet mới biết tiles nào cần load
                        if (!this.mapReady && this.tileLayer) {
                            this.tileLayer.once('load', () => { this.mapReady = true; });
                            setTimeout(() => { this.mapReady = true; }, 7000); // safety fallback
                        }
                    } else if (this.activeId) {
                        const loc = this.activeLocation;
                        this.map.flyTo([loc.lat, loc.lng], 13, { duration: 1.5 });
                    }
                },

                setActive(id) {
                    this.activeId = id;
                    this.updateMap(false);
                },

                adjustAdults(delta) {
                    const loc = this.activeLocation;
                    loc.adults = Math.max(1, loc.adults + delta);
                    this.saveHeadcounts();
                },

                adjustChildren(delta) {
                    const loc = this.activeLocation;
                    loc.children = Math.max(0, loc.children + delta);
                    this.saveHeadcounts();
                },

                saveHeadcounts() {
                    if (!this.currentPlanId) return;
                    const data = {};
                    this.currentPlan.locations.forEach(loc => {
                        data[loc.id] = { adults: loc.adults, children: loc.children };
                    });
                    localStorage.setItem(`vt_hc_${this.currentPlanId}`, JSON.stringify(data));
                },

                restoreHeadcounts(planId) {
                    const saved = localStorage.getItem(`vt_hc_${planId}`);
                    if (!saved) return;
                    try {
                        const data = JSON.parse(saved);
                        this.plans[planId].locations.forEach(loc => {
                            if (data[loc.id]) {
                                loc.adults = data[loc.id].adults ?? loc.adults;
                                loc.children = data[loc.id].children ?? loc.children;
                            }
                        });
                    } catch (e) {}
                },

                async changePlan(planId) {
                    if (!planId) return;

                    // Lazy fetch nếu chưa có trong cache
                    if (!this.plans[planId]) {
                        this.planLoading = true;
                        try {
                            const res = await fetch(`/api/plans/${planId}`);
                            if (!res.ok) throw new Error('Failed to load plan');
                            const full = await res.json();
                            this.plans[planId] = {
                                name: full.name,
                                slug: full.slug,
                                dateRange: full.dateRange,
                                locations: full.locations,
                            };
                            this.restoreHeadcounts(planId);
                        } catch (e) {
                            console.error('Lỗi tải plan:', e);
                            this.planLoading = false;
                            return;
                        }
                        this.planLoading = false;
                    }

                    this.currentPlanId = planId;
                    const firstLoc = this.currentPlan.locations?.[0];
                    this.activeId = firstLoc?.id ?? null;
                    this.$nextTick(() => {
                        if (!this.map) this.initMap();
                        else this.updateMap(true);
                    });
                },

                syncPlanSlugToUrl() {
                    const plan = this.currentPlan;
                    if (!plan) return;

                    const url = new URL(window.location.href);
                    url.searchParams.delete('plan');
                    url.searchParams.set('slug', this.currentPlanId);
                    window.history.replaceState({}, '', url);
                },

                formatCurrency(value) {
                    return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(value);
                },

                getTransportIcon(type) {
                    const icons = { car: '🚗', bus: '🚌', train: '🚂', flight: '✈️', motorbike: '🏍️', other: '🚐' };
                    return icons[(type || '').toLowerCase()] || '🚐';
                },

                getTransportMapStyle(type) {
                    const styles = {
                        flight: { border: '#38bdf8', color: '#7dd3fc' },
                        bus: { border: '#fb923c', color: '#fdba74' },
                        train: { border: '#a78bfa', color: '#c4b5fd' },
                        car: { border: '#4ade80', color: '#86efac' },
                        motorbike: { border: '#facc15', color: '#fde047' },
                        other: { border: '#94a3b8', color: '#cbd5e1' },
                    };
                    return styles[(type || '').toLowerCase()] || { border: 'rgba(255,255,255,0.3)', color: '#94a3b8' };
                },

                getTransportStyle(type) {
                    const styles = {
                        flight: 'bg-sky-500/15 border-sky-500/30 text-sky-400',
                        bus: 'bg-orange-500/15 border-orange-500/30 text-orange-400',
                        train: 'bg-purple-500/15 border-purple-500/30 text-purple-400',
                        car: 'bg-green-500/15 border-green-500/30 text-green-400',
                        motorbike: 'bg-yellow-500/15 border-yellow-500/30 text-yellow-400',
                        other: 'bg-slate-500/15 border-slate-500/30 text-slate-400',
                    };
                    return styles[(type || '').toLowerCase()] || 'bg-white/5 border-white/10 text-slate-400';
                },

                getTransportShortLabel(type, label) {
                    const names = { car: 'Xe riêng', bus: 'Xe khách', train: 'Tàu hỏa', flight: 'Bay', motorbike: 'Xe máy', other: 'Di chuyển' };
                    const name = names[(type || '').toLowerCase()] || 'Di chuyển';
                    const dur = (label || '').match(/~?(\d+h\s*\d*m?)/i);
                    return dur ? `${name} · ${dur[0]}` : name;
                },

                formatNumberInput(value) {
                    const numberValue = Number(value || 0);
                    return new Intl.NumberFormat('vi-VN').format(numberValue);
                },

                parseNumberInput(value) {
                    const normalized = String(value ?? '').replace(/[^\d]/g, '');
                    const parsed = Number(normalized);
                    return Number.isFinite(parsed) ? parsed : 0;
                },

                updateMoneyField(target, key, rawValue) {
                    if (!target) return;
                    target[key] = Math.max(0, this.parseNumberInput(rawValue));
                },

                parseDateTimeLocal(value) {
                    if (!value) return null;
                    const date = new Date(value);
                    return Number.isNaN(date.getTime()) ? null : date;
                },

                parseDateRange(dateRange) {
                    const raw = String(dateRange || '');
                    const [startPart, endPart] = raw.split(' - ');
                    const parsePart = (part) => {
                        if (!part) return null;
                        const [datePart, timePart = '00:00'] = part.trim().split(' ');
                        const [day, month, year] = (datePart || '').split('/').map(Number);
                        const [hour, minute] = (timePart || '').split(':').map(Number);
                        if (![day, month, year, hour, minute].every(Number.isFinite)) return null;
                        return new Date(year, month - 1, day, hour, minute);
                    };
                    return { start: parsePart(startPart), end: parsePart(endPart) };
                },

                toDateTimeLocalValue(date) {
                    if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
                    const pad = (n) => String(n).padStart(2, '0');
                    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
                },

                formatDateTimeDisplay(date) {
                    if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
                    const pad = (n) => String(n).padStart(2, '0');
                    return `${pad(date.getDate())}/${pad(date.getMonth() + 1)}/${date.getFullYear()} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
                },

                getDayOfYear(date) {
                    if (!(date instanceof Date) || Number.isNaN(date.getTime())) return null;
                    const start = new Date(date.getFullYear(), 0, 1);
                    const diff = date - start;
                    return Math.floor(diff / 86400000) + 1;
                },

                formatDateMeta(value) {
                    const date = this.parseDateTimeLocal(value);
                    if (!date) return '';
                    const weekday = date.toLocaleDateString('vi-VN', { weekday: 'long' });
                    const dayOfYear = this.getDayOfYear(date);
                    return `${weekday} · ngày thứ ${dayOfYear} trong năm`;
                },

                formatDateRangeCompact(dateRange) {
                    const { start, end } = this.parseDateRange(dateRange);
                    if (!start || !end) return String(dateRange || '');
                    const startLabel = this.formatDateTimeDisplay(start);
                    const endLabel = this.formatDateTimeDisplay(end);
                    const weekdayStart = start.toLocaleDateString('vi-VN', { weekday: 'short' });
                    const weekdayEnd = end.toLocaleDateString('vi-VN', { weekday: 'short' });
                    return `${weekdayStart} ${startLabel} → ${weekdayEnd} ${endLabel}`;
                },

                formatDateArrival(dateRange) {
                    const { start } = this.parseDateRange(dateRange);
                    if (!start) return '—';
                    return this.formatDateTimeDisplay(start);
                },

                formatDateDeparture(dateRange) {
                    const { end } = this.parseDateRange(dateRange);
                    if (!end) return '—';
                    return this.formatDateTimeDisplay(end);
                },

                calculateLocationCost(loc) {
                    if (!loc) return 0;
                    const rawDays = typeof loc.duration === 'number' ? loc.duration : 1;
                    const days = Math.max(rawDays, 1);
                    const adults = loc.adults || 0;
                    const children = loc.children || 0;

                    const ticketCost = ((loc.adultPrice || 0) * adults) + ((loc.childPrice || 0) * children);
                    const stayCost = (loc.stayCostPerNight || 0) * Math.max(rawDays - 1, 0);
                    const foodCost = (loc.foodBudgetPerDay || 0) * days;
                    const adultFare = loc.transportFareAdult || loc.transportFare || 0;
                    const childFare = loc.transportFareChild || 0;
                    const transportCost = adultFare * adults + childFare * children;

                    return ticketCost + stayCost + foodCost + transportCost;
                },

                calculateTotalPlanCost(plan = this.currentPlan) {
                    if (!plan || !plan.locations) return 0;
                    return plan.locations.reduce((total, loc) => {
                        return total + this.calculateLocationCost(loc);
                    }, 0);
                },

                sharePlan() {
                    const shareUrl = new URL(window.location.href);
                    if (this.currentPlan?.slug) {
                        shareUrl.searchParams.delete('plan');
                        shareUrl.searchParams.set('slug', this.currentPlan.slug);
                    } else {
                        shareUrl.searchParams.delete('slug');
                        shareUrl.searchParams.set('plan', this.currentPlanId);
                    }
                    const text = `Lịch trình ${this.currentPlan.name}`;

                    if (navigator.share) {
                        navigator.share({
                            title: this.currentPlan.name,
                            text,
                            url: shareUrl.toString(),
                        }).catch(() => {});
                        return;
                    }

                    navigator.clipboard.writeText(shareUrl.toString())
                        .then(() => alert('Đã copy link chia sẻ vào clipboard'))
                        .catch(() => alert(shareUrl.toString()));
                },

                printPlan() {
                    const plan = this.currentPlan;
                    if (!plan || !Array.isArray(plan.locations) || plan.locations.length === 0) return;

                    const escapeHtml = (value) => String(value ?? '')
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#39;');

                    const formatMoney = (value) => new Intl.NumberFormat('vi-VN', {
                        style: 'currency',
                        currency: 'VND'
                    }).format(Number(value || 0));

                    const rowsHtml = plan.locations.map((loc, index) => {
                        const cost = this.calculateLocationCost(loc);
                        const stayDays = typeof loc.duration === 'number' ? `${loc.duration} ngày` : String(loc.duration || '');
                        return `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${escapeHtml(loc.name)}</td>
                                <td>${escapeHtml(loc.province || '')}</td>
                                <td>${escapeHtml(loc.dateRange || '')}</td>
                                <td>${escapeHtml(stayDays)}</td>
                                <td>${escapeHtml(loc.transport)}</td>
                                <td>${escapeHtml(loc.highlight)}</td>
                                <td class="money">${(() => {
                                    const af = loc.transportFareAdult || loc.transportFare || 0;
                                    const cf = loc.transportFareChild || 0;
                                    if (cf > 0 && af !== cf) return `NL: ${formatMoney(af)} / TE: ${formatMoney(cf)}`;
                                    return formatMoney(af);
                                })()}</td>
                                <td class="money">${formatMoney(loc.stayCostPerNight || 0)}</td>
                                <td class="money">${formatMoney(loc.foodBudgetPerDay || 0)}</td>
                                <td>${escapeHtml((loc.activities || []).join(', '))}</td>
                                <td>${escapeHtml((loc.food || []).join(', '))}</td>
                                <td class="num">${Number(loc.adults || 0)}</td>
                                <td class="num">${Number(loc.children || 0)}</td>
                                <td class="money">${formatMoney(cost)}</td>
                            </tr>
                        `;
                    }).join('');

                    const totalCost = formatMoney(this.calculateTotalPlanCost(plan));
                    const generatedAt = new Date().toLocaleString('vi-VN');

                    const html = `

                    const printWindow = window.open('', '_blank', 'width=1200,height=900');
                    if (!printWindow) {

                        return;

                    printWindow.document.write(html);
                    printWindow.document.close();

                addToCalendar() {
                    const loc = this.activeLocation;
                    if (!loc || !loc.name) return;

                    const now = new Date();
                    const start = new Date(now.getTime() + 60 * 60 * 1000);
                    const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);

                    const formatDate = (date) => {
                        const pad = (value) => String(value).padStart(2, '0');
                        return `${date.getUTCFullYear()}${pad(date.getUTCMonth() + 1)}${pad(date.getUTCDate())}T${pad(date.getUTCHours())}${pad(date.getUTCMinutes())}${pad(date.getUTCSeconds())}Z`;
                    };

                    const details = [
                        loc.description || '',
                        `Di chuyển: ${loc.transport || 'N/A'}`,
                        `Điểm nổi bật: ${loc.highlight || 'N/A'}`,
                    ].join('\n');

                    const calendarUrl = new URL('https://calendar.google.com/calendar/render');
                    calendarUrl.searchParams.set('action', 'TEMPLATE');
                    calendarUrl.searchParams.set('text', loc.name);
                    calendarUrl.searchParams.set('details', details);
                    calendarUrl.searchParams.set('location', `${loc.name}, Việt Nam`);
                    calendarUrl.searchParams.set('dates', `${formatDate(start)}/${formatDate(end)}`);

                    window.open(calendarUrl.toString(), '_blank', 'noopener,noreferrer');
                },

            }
        }
